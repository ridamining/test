<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rida Network - Mine Rida Daily</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div id="app" class="min-h-screen p-6">
    <!-- Static fallback content -->
    <div class="max-w-md mx-auto text-center mt-20">
      <div class="text-8xl mb-6">⛏️</div>
      <h1 class="text-5xl font-bold mb-4">Rida Network</h1>
      <p class="text-xl text-zinc-400 mb-10">Daily Mining Platform</p>
      <button onclick="showLogin()" class="px-8 py-4 bg-emerald-500 hover:bg-emerald-600 rounded-2xl text-lg font-semibold mr-4">Login</button>
      <button onclick="showRegister()" class="px-8 py-4 border border-white/30 hover:bg-white/10 rounded-2xl text-lg font-semibold">Join Free</button>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyMYNHXZ7g40fD6GVpSFMWCHFh6leDEqij-HeZ8i5RWUR5JFvXlTZc3XJ2DEa_LjAEF/exec";
    let currentToken = localStorage.getItem('ridaToken') || null;

    function showToast(msg, type = 'success') {
      const t = document.createElement('div');
      t.style.cssText = `position:fixed;bottom:30px;right:30px;padding:16px 24px;border-radius:16px;color:white;z-index:9999;${type==='success'?'background:#10b981':'background:#ef4444'}`;
      t.innerHTML = `<i class="fa-solid \( {type==='success'?'fa-check-circle':'fa-exclamation-circle'} mr-2"></i> \){msg}`;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 4000);
    }

    async function apiCall(action, body = {}) {
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({action, token: currentToken, ...body})
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || 'Failed');
        return data;
      } catch (err) {
        console.error(err);
        showToast(err.message || 'Cannot reach server', 'error');
        throw err;
      }
    }

    function showLogin() {
      document.getElementById('app').innerHTML = `
        <div class="max-w-md mx-auto mt-20 bg-zinc-900 p-10 rounded-3xl">
          <h2 class="text-3xl font-bold text-center mb-8">Login</h2>
          <input id="email" type="email" placeholder="Email" class="w-full bg-zinc-800 border border-white/10 rounded-2xl px-6 py-4 mb-4">
          <input id="password" type="password" placeholder="Password" class="w-full bg-zinc-800 border border-white/10 rounded-2xl px-6 py-4 mb-8">
          <button onclick="handleLogin()" class="w-full py-4 bg-emerald-500 rounded-2xl font-semibold">Login</button>
          <p class="text-center mt-6 text-zinc-400">New user? <span onclick="showRegister()" class="text-emerald-400 cursor-pointer">Register</span></p>
        </div>`;
    }

    function showRegister() {
      document.getElementById('app').innerHTML = `
        <div class="max-w-md mx-auto mt-20 bg-zinc-900 p-10 rounded-3xl">
          <h2 class="text-3xl font-bold text-center mb-8">Create Account</h2>
          <input id="email" type="email" placeholder="Email" class="w-full bg-zinc-800 border border-white/10 rounded-2xl px-6 py-4 mb-4">
          <input id="password" type="password" placeholder="Password" class="w-full bg-zinc-800 border border-white/10 rounded-2xl px-6 py-4 mb-8">
          <button onclick="handleRegister()" class="w-full py-4 bg-emerald-500 rounded-2xl font-semibold">Register</button>
          <p class="text-center mt-6 text-zinc-400">Already have account? <span onclick="showLogin()" class="text-emerald-400 cursor-pointer">Login</span></p>
        </div>`;
    }

    async function handleRegister() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!email || !password) return showToast('Fill all fields', 'error');
      try {
        await apiCall('register', {email, password});
        showToast('Account created! Please login.', 'success');
        showLogin();
      } catch(e){}
    }

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!email || !password) return showToast('Fill all fields', 'error');
      try {
        const data = await apiCall('login', {email, password});
        currentToken = data.token;
        localStorage.setItem('ridaToken', currentToken);
        showToast('Login successful!', 'success');
        document.getElementById('app').innerHTML = `<div class="max-w-md mx-auto mt-20 text-center"><p class="text-4xl">✅ Welcome to Dashboard</p><p class="text-emerald-400 mt-6">Balance & Claim features ready in next update</p></div>`;
      } catch(e){}
    }

    // Start
    window.onload = () => {
      // Show basic landing immediately
      document.getElementById('app').innerHTML = `
        <div class="max-w-md mx-auto text-center mt-20">
          <div class="text-8xl mb-6">⛏️</div>
          <h1 class="text-5xl font-bold mb-4">Rida Network</h1>
          <p class="text-xl text-zinc-400 mb-10">Claim 5 Rida every 24 hours</p>
          <button onclick="showLogin()" class="px-8 py-4 bg-emerald-500 hover:bg-emerald-600 rounded-2xl text-lg font-semibold mr-3">Login</button>
          <button onclick="showRegister()" class="px-8 py-4 border border-white/30 hover:bg-white/10 rounded-2xl text-lg font-semibold">Join Free</button>
        </div>`;
    };
  </script>
</body>
</html>
