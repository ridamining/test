<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rida Mining Pro</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:#fff;
}

/* GLASS UI */
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border-radius:16px;
  padding:15px;
  margin-bottom:12px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

/* INPUT */
input,button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
}

button{
  background:linear-gradient(45deg,#06b6d4,#3b82f6);
  color:#fff;
  font-weight:bold;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#020617;
}

.nav button{
  flex:1;
  background:none;
  color:#fff;
}

/* MINING ANIMATION */
.mining{
  text-align:center;
  font-size:20px;
  color:#22c55e;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

.hidden{display:none;}
.container{padding:15px; max-width:500px; margin:auto;}
h2{text-align:center;}

.chat{
  height:150px;
  overflow:auto;
  background:#020617;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- AUTH -->
<div id="auth">
<h2>Rida Mining</h2>
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="ref" placeholder="Referral Code">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<!-- HOME -->
<div id="home">
<div class="card">
<h3 id="userEmail"></h3>
<p>Balance: <b id="balance">0</b></p>
<p>Status: <span id="status"></span></p>
</div>

<div class="card">
<h3>Mining</h3>
<div id="miningStatus">Inactive</div>
</div>

<div class="card">
<h3>Broadcast</h3>
<div id="broadcast"></div>
</div>
</div>

<!-- REFERRAL -->
<div id="refPage" class="hidden">
<div class="card">
<h3>Your Referral</h3>
<p id="refLink"></p>
</div>
</div>

<!-- CHAT -->
<div id="chatPage" class="hidden">
<div class="card">
<h3>Support Chat</h3>
<div class="chat" id="chatBox"></div>
<input id="msg">
<button onclick="sendMsg()">Send</button>
</div>
</div>

<!-- ADMIN -->
<div id="adminPage" class="hidden">
<div class="card">
<h3>Admin Panel</h3>

<input id="adminKey" placeholder="Admin Key">
<button onclick="loadUsers()">Load Users</button>

<div id="users"></div>

<hr>

<input id="broadcastMsg" placeholder="Broadcast Message">
<button onclick="sendBroadcast()">Send Broadcast</button>

</div>
</div>

</div>

</div>

<!-- NAV -->
<div class="nav hidden" id="nav">
<button onclick="navTo('home')">Home</button>
<button onclick="navTo('refPage')">Referral</button>
<button onclick="navTo('chatPage')">Chat</button>
<button onclick="navTo('adminPage')">Admin</button>
<button onclick="logout()">Exit</button>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycby7dnjsLTLx4o_IVTrmA3wg08xG8VVDmnEEOzNmDR64wiWHpodLPv_rYSMKG_gOXCuVzA/exec";

let user=null;

// REF FROM URL
const urlParams=new URLSearchParams(window.location.search);
if(urlParams.get("ref")){
localStorage.setItem("ref",urlParams.get("ref"));
}

// REGISTER
function register(){
fetch(API,{
method:"POST",
body:JSON.stringify({
action:"registerUser",
name:name.value,
email:email.value,
ref:localStorage.getItem("ref")||ref.value
})
}).then(r=>r.json()).then(d=>alert(d.status));
}

// LOGIN
function login(){
fetch(API,{
method:"POST",
body:JSON.stringify({
action:"getUser",
email:email.value
})
}).then(r=>r.json()).then(d=>{
if(d.status==="success"){
user=d.user;
localStorage.setItem("user",JSON.stringify(user));
startApp();
}else alert("User not found");
});
}

// START APP
function startApp(){
document.getElementById("auth").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
document.getElementById("nav").classList.remove("hidden");

user=JSON.parse(localStorage.getItem("user"));

userEmail.innerText=user[1];
balance.innerText=user[4];
status.innerText=user[7];
refLink.innerText=location.origin+"?ref="+user[6];

startMining();
loadBroadcast();
loadChat();
}

// NAVIGATION
function navTo(p){
["home","refPage","chatPage","adminPage"].forEach(id=>{
document.getElementById(id).classList.add("hidden");
});
document.getElementById(p).classList.remove("hidden");
}

// MINING
function startMining(){
miningStatus.innerHTML='<div class="mining">Mining Active ⚡</div>';

setInterval(()=>{
fetch(API,{
method:"POST",
body:JSON.stringify({
action:"checkIn",
userId:user[0]
})
})
.then(r=>r.json())
.then(d=>{
if(d.status==="success"){
balance.innerText=d.balance;
}
});
},5000);
}

// BROADCAST
function loadBroadcast(){
fetch(API,{
method:"POST",
body:JSON.stringify({action:"getBroadcasts"})
})
.then(r=>r.json())
.then(d=>{
if(d.status==="success"){
broadcast.innerHTML=d.data.map(x=>`<p>📢 ${x[1]}</p>`).join("");
}
});
}

// CHAT
function sendMsg(){
fetch(API,{
method:"POST",
body:JSON.stringify({
action:"sendMessage",
userId:user[0],
msg:msg.value
})
});
msg.value="";
}

function loadChat(){
setInterval(()=>{
fetch(API,{
method:"POST",
body:JSON.stringify({
action:"getMessages",
userId:user[0]
})
})
.then(r=>r.json())
.then(d=>{
if(d.status==="success"){
chatBox.innerHTML=d.data.map(x=>`<p>${x[3]}</p>`).join("");
}
});
},3000);
}

// ADMIN
function loadUsers(){
fetch(API,{
method:"POST",
body:JSON.stringify({
action:"getAllUsers",
key:adminKey.value
})
})
.then(r=>r.json())
.then(d=>{
if(d.status==="success"){
users.innerHTML=d.data.map(x=>`
<div class="card">
${x[1]} - ${x[7]}
<button onclick="verify('${x[0]}','true')">Approve</button>
<button onclick="verify('${x[0]}','rejected')">Reject</button>
</div>
`).join("");
}
});
}

function verify(id,status){
fetch(API,{
method:"POST",
body:JSON.stringify({
action:"verifyUser",
key:adminKey.value,
userId:id,
status:status
})
}).then(()=>loadUsers());
}

function sendBroadcast(){
fetch(API,{
method:"POST",
body:JSON.stringify({
action:"addBroadcast",
key:adminKey.value,
msg:broadcastMsg.value
})
}).then(()=>alert("Sent"));
}

// LOGOUT
function logout(){
localStorage.clear();
location.reload();
}

// AUTO LOGIN
if(localStorage.getItem("user")) startApp();
</script>

</body>
</html>
