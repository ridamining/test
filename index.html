    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby3Pb33YjqnNkkZjTKjgg0ZxULHaLvb2U9O-TzM4nNMim-trzO0Tp2wy1VujHFv2YePWw/exec";
        let isLoginMode = true;
        let userData = JSON.parse(localStorage.getItem('rida_pro_session'));
        let miningInterval;

        window.onload = () => {
            if (userData) {
                showDashboard();
            }
            lucide.createIcons();
        };

        function toggleAuth() {
            isLoginMode = !isLoginMode;
            document.getElementById('signupGroup').classList.toggle('hidden', isLoginMode);
            document.getElementById('authTitle').innerText = isLoginMode ? "Secure Login" : "Create Account";
            document.getElementById('authBtn').innerText = isLoginMode ? "Authenticate" : "Register Now";
            document.getElementById('toggleBtn').innerText = isLoginMode ? "Register" : "Login";
        }

        async function handleAuth() {
            const btn = document.getElementById('authBtn');
            const email = document.getElementById('authEmail').value;
            const pass = document.getElementById('authPass').value;
            if (!email || !pass) return alert("Fields Required");
            
            btn.disabled = true;
            btn.innerHTML = `<span class="flex items-center justify-center gap-2"><div class="w-4 h-4 border-2 border-t-transparent border-white rounded-full animate-spin"></div> PROCESSING...</span>`;

            const payload = {
                action: isLoginMode ? 'login' : 'register',
                email, password: pass,
                name: document.getElementById('regName').value || ""
            };

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                const data = await res.json();
                if (data.status === "success") {
                    localStorage.setItem('rida_pro_session', JSON.stringify(data.user));
                    userData = data.user;
                    showDashboard();
                } else { alert(data.message); }
            } catch (e) { alert("API Connection Failed"); }
            btn.disabled = false;
            btn.innerText = isLoginMode ? "Authenticate" : "Register Now";
        }

        function showDashboard() {
            document.getElementById('authPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            
            // Update Text Fields
            document.getElementById('userUID').innerText = "UID: " + userData.uid;
            document.getElementById('balance').innerText = parseFloat(userData.balance || 0).toFixed(2);
            document.getElementById('userAvatar').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${userData.uid}`;
            
            // Start the "Silent" UI elements
            startUIRenderer();
            lucide.createIcons();
        }

        // --- NEW: UI ENGINE (Makes the app "Live") ---
        function startUIRenderer() {
            if (miningInterval) clearInterval(miningInterval);
            
            let progress = 0;
            const timerEl = document.getElementById('timerDisplay');
            const btn = document.getElementById('miningBtn');

            // Simulate 24-hour countdown (86400 seconds)
            let totalSeconds = 86400; 

            miningInterval = setInterval(() => {
                totalSeconds--;
                
                // 1. Update Timer Text
                let hrs = Math.floor(totalSeconds / 3600);
                let mins = Math.floor((totalSeconds % 3600) / 60);
                let secs = totalSeconds % 60;
                timerEl.innerText = `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;

                // 2. Update Progress Ring (0-100%)
                progress = ((86400 - totalSeconds) / 86400) * 100;
                updateMiningProgress(progress);

                if (totalSeconds <= 0) {
                    clearInterval(miningInterval);
                    btn.innerText = "CLAIM REWARDS";
                    btn.classList.replace('bg-blue-600', 'bg-green-600');
                }
            }, 1000);
        }

        function updateMiningProgress(percent) {
            const circle = document.getElementById('miningProgress');
            const radius = circle.r.baseVal.value;
            const circumference = radius * 2 * Math.PI;
            circle.style.strokeDasharray = `${circumference} ${circumference}`;
            const offset = circumference - (percent / 100 * circumference);
            circle.style.strokeDashoffset = offset;
        }

        async function handleMining() {
            const btn = document.getElementById('miningBtn');
            if (btn.innerText === "CLAIM REWARDS") {
                // Logic to call API and claim
                location.reload(); 
                return;
            }

            btn.innerText = "ACTIVATING...";
            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'startMining', uid: userData.uid }) 
                });
                const data = await res.json();
                if(data.status === "success") {
                    alert("Mining Node Activated!");
                    btn.innerText = "NODE ACTIVE";
                    btn.disabled = true;
                    btn.classList.add('opacity-50');
                }
            } catch (e) { alert("Mining activation failed."); }
        }

        function toggleDrawer(open) {
            document.getElementById('drawer').style.transform = open ? "translateX(0)" : "translateX(-100%)";
        }

        function openTransfer() { document.getElementById('p2pModal').classList.remove('hidden'); }
        function closeTransfer() { document.getElementById('p2pModal').classList.add('hidden'); }
        
        function copyUID() {
            navigator.clipboard.writeText(userData.uid);
            alert("UID Copied to Clipboard!");
        }

        function logout() {
            localStorage.removeItem('rida_pro_session');
            location.reload();
        }
    </script>
