<!DOCTYPE html>
<html>
<head>
    <title>RIDA DEBUG</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen">
    <div id="statusBox" class="text-center p-10 border border-white/10 rounded-3xl bg-white/5">
        <h1 class="text-4xl font-bold mb-4">RIDA SYSTEM</h1>
        <p id="msg" class="text-blue-500 animate-pulse">Initializing Interface...</p>
        
        <div id="loginArea" class="mt-8 space-y-4">
            <input type="email" id="email" class="block w-full p-4 bg-black rounded-xl" placeholder="Email">
            <input type="password" id="pass" class="block w-full p-4 bg-black rounded-xl" placeholder="Password">
            <button onclick="checkAdmin()" class="w-full bg-blue-600 p-4 rounded-xl font-bold">LOGIN</button>
        </div>

        <div id="adminArea" class="hidden mt-8 text-left">
            <h2 class="text-green-500 font-bold">ADMIN PANEL ACTIVE</h2>
            <button onclick="fetchData()" class="mt-4 p-2 bg-white/10 rounded">Sync Cloud</button>
            <div id="out" class="mt-4 text-[10px] font-mono"></div>
        </div>
    </div>

    <script>
        // REPLACE THIS WITH YOUR NEW WEB APP URL EVERY TIME YOU DEPLOY
        const URL = "https://script.google.com/macros/s/AKfycbyxYat7kzNr2xZ4X0I16BFUTDXd1gtZfXz0gGAhSAuzBYfbgpu_85vPfXCeb51gBS7Fgg/exec";

        function checkAdmin() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            
            if(e === "adminrida@gmail.com" && p === "CocoMomoPakistan@786") {
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('adminArea').classList.remove('hidden');
                document.getElementById('msg').innerText = "Master Controller Online";
            } else {
                alert("User Mode Active - Mining Starting");
            }
        }

        async function fetchData() {
            document.getElementById('out').innerText = "Loading...";
            try {
                const res = await fetch(URL);
                const data = await res.json();
                document.getElementById('out').innerText = JSON.stringify(data, null, 2);
            } catch(err) {
                document.getElementById('out').innerText = "Error: " + err.message;
            }
        }
    </script>
</body>
</html>
