<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIDA NETWORK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Grotesk:wght@500&display=swap');
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); }
        .neon { box-shadow: 0 0 25px -5px #00f7ff; }
    </style>
</head>
<body class="bg-[#0a0a0f] text-white min-h-screen">

    <!-- HEADER -->
    <div id="header" class="hidden sticky top-0 bg-black/90 border-b border-white/10 z-50">
        <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-3xl">⛏️</span>
                <h1 class="text-3xl font-bold">RIDA NETWORK</h1>
            </div>
            <div class="flex items-center gap-6">
                <div id="nav-balance" class="text-emerald-400 font-semibold">0.000000 RIDA</div>
                <div id="nav-email" class="text-sm"></div>
                <button onclick="logout()" class="text-red-400">Logout</button>
            </div>
        </div>
    </div>

    <!-- AUTH -->
    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-md glass border border-white/10 rounded-3xl p-8 neon">
            <div class="text-center mb-8">
                <div class="text-6xl mb-4">⛏️</div>
                <h2 class="text-4xl font-bold">RIDA NETWORK</h2>
            </div>

            <input id="email" type="email" placeholder="Email" class="w-full p-4 bg-zinc-900 border border-zinc-700 rounded-2xl mb-3">
            <input id="password" type="password" placeholder="Password" class="w-full p-4 bg-zinc-900 border border-zinc-700 rounded-2xl mb-6">

            <button onclick="handleAuth()" class="w-full py-4 bg-gradient-to-r from-cyan-400 to-purple-500 text-black font-bold rounded-3xl">LOGIN / REGISTER</button>

            <p id="message" class="text-center mt-4 text-sm"></p>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app" class="hidden p-6 max-w-4xl mx-auto">
        <h1 id="welcome" class="text-3xl font-bold text-center mb-2"></h1>
        <p id="balance" class="text-center text-emerald-400 text-2xl mb-10"></p>

        <div class="glass border border-white/10 rounded-3xl p-8">
            <h2 class="text-2xl mb-6">Mining Control</h2>
            
            <button onclick="startMining()" id="start-btn"
                    class="w-full py-6 text-xl font-bold bg-emerald-600 hover:bg-emerald-700 rounded-3xl mb-4">
                START MINING (24 Hours)
            </button>

            <div id="mining-active" class="hidden text-center">
                <div class="text-7xl mb-6">⛏️</div>
                <div id="live-earned" class="text-6xl font-mono text-emerald-400">0.000000</div>
                <p class="text-white/70 mb-8">RIDA earned so far</p>
                <button onclick="claimReward()" 
                        class="px-12 py-4 bg-white text-black font-bold rounded-3xl text-lg">
                    CLAIM 0.1 RIDA
                </button>
            </div>
        </div>

        <div class="text-center mt-10">
            <button onclick="logout()" class="text-red-400">Logout</button>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzMvRrdKuXbAuL7Gg84nZOmIeOs1OJs9Aec2tHTSH5jSgtgwS9k-_3ZDPklOQCLdw0lkQ/exec";

        let currentUser = null;
        let sessionToken = null;
        let miningInterval = null;

        function showMessage(text, isError = true) {
            const el = document.getElementById('message');
            el.textContent = text;
            el.style.color = isError ? '#f87171' : '#4ade80';
        }

        async function apiCall(action, extra = {}) {
            const payload = {
                action: action,
                email: currentUser ? currentUser.email : extra.email,
                token: sessionToken,
                ...extra
            };

            try {
                const res = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });

                const text = await res.text();
                const json = JSON.parse(text);

                if (!json.success) {
                    throw new Error(json.error || "Server error");
                }
                return json.data || json;
            } catch (err) {
                console.error(err);
                showMessage(err.message);
                throw err;
            }
        }

        async function handleAuth() {
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;

            if (!email || !password) return showMessage("Email and password required");

            try {
                let result;

                // Try Login first
                try {
                    result = await apiCall('LOGIN', { email, password });
                } catch (e) {
                    // If login fails, try Register
                    result = await apiCall('REGISTER', { email, password });
                }

                currentUser = result.user;
                sessionToken = result.token || "";

                // Save session
                localStorage.setItem('rida_session', JSON.stringify({
                    email: currentUser.email,
                    token: sessionToken
                }));

                // Go to main app
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('header').classList.remove('hidden');

                document.getElementById('welcome').textContent = `Welcome, ${currentUser.email}`;
                document.getElementById('balance').textContent = `Balance: 0.000000 RIDA`;

                showMessage("Login successful!", false);
            } catch (e) {
                showMessage(e.message);
            }
        }

        async function startMining() {
            try {
                await apiCall('START_MINING');
                showMessage("Mining started successfully!", false);

                document.getElementById('start-btn').classList.add('hidden');
                document.getElementById('mining-active').classList.remove('hidden');

                // Live counter
                let earned = 0;
                if (miningInterval) clearInterval(miningInterval);
                miningInterval = setInterval(() => {
                    earned += 0.1 / 86400;
                    document.getElementById('live-earned').textContent = earned.toFixed(6);
                }, 800);
            } catch (e) {
                showMessage(e.message);
            }
        }

        async function claimReward() {
            try {
                const res = await apiCall('CLAIM_REWARD');
                showMessage(`Successfully claimed ${res.reward || 0.1} RIDA!`, false);
                
                document.getElementById('mining-active').classList.add('hidden');
                document.getElementById('start-btn').classList.remove('hidden');
                if (miningInterval) clearInterval(miningInterval);

                // Refresh balance
                const data = await apiCall('GET_USER');
                document.getElementById('balance').textContent = `Balance: ${parseFloat(data.user.balance || 0).toFixed(6)} RIDA`;
            } catch (e) {
                showMessage(e.message);
            }
        }

        function logout() {
            localStorage.removeItem('rida_session');
            location.reload();
        }

        // Auto login
        async function tryAutoLogin() {
            const saved = localStorage.getItem('rida_session');
            if (!saved) return;

            const { email, token } = JSON.parse(saved);
            sessionToken = token;
            currentUser = { email };

            try {
                const data = await apiCall('GET_USER');
                currentUser = data.user;
                sessionToken = data.token || token;

                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('header').classList.remove('hidden');

                document.getElementById('welcome').textContent = `Welcome, ${currentUser.email}`;
                document.getElementById('balance').textContent = `Balance: ${parseFloat(currentUser.balance || 0).toFixed(6)} RIDA`;
            } catch (e) {
                localStorage.removeItem('rida_session');
            }
        }

        window.onload = tryAutoLogin;
    </script>
</body>
</html>
