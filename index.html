<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rida Network</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0a0f1c;
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
}

.balance{
  font-size:28px;
  font-weight:bold;
}

/* MINING CIRCLE */
.circle{
  width:260px;
  height:260px;
  border-radius:50%;
  border:4px solid #5b6cff;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:40px auto;
  font-size:40px;
}

.active{
  animation:rotate 3s linear infinite;
}

@keyframes rotate{
  from{transform:rotate(0)}
  to{transform:rotate(360deg)}
}

.timer{
  text-align:center;
  margin-top:20px;
}

/* BUTTON */
.btn{
  width:90%;
  margin:20px auto;
  display:block;
  padding:15px;
  border:none;
  border-radius:10px;
  background:#444;
  color:white;
}

/* BOTTOM NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.nav div{
  flex:1;
  text-align:center;
  padding:10px;
}

/* DRAWER */
.drawer{
  position:fixed;
  left:-250px;
  top:0;
  width:250px;
  height:100%;
  background:#111;
  transition:0.3s;
}

.drawer.active{
  left:0;
}
</style>
</head>

<body>

<div class="header">
  <div onclick="toggleDrawer()">☰</div>
  <div class="balance" id="balance">0</div>
</div>

<!-- MINING -->
<div id="home">

<div class="circle" id="circle">0.00</div>

<div class="timer" id="timer">Not Started</div>

<button class="btn" id="mineBtn" onclick="startMining()">Start Mining</button>

</div>

<!-- DRAWER -->
<div id="drawer" class="drawer">
  <h3>Menu</h3>
  <p onclick="showProfile()">Profile</p>
  <p onclick="showWithdraw()">Withdraw</p>
  <p onclick="logout()">Logout</p>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="showHome()">Home</div>
  <div onclick="showProfile()">Profile</div>
  <div onclick="showWithdraw()">Withdraw</div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbwP3T0zDznxDcoLyucOX8AM2NWZOHBFpp8CylTDeCQZ0biLwm2AC1wpxpdDSYYY2yHT/exec";

let token=localStorage.getItem("token");
let mining=false;
let last=0;

// LOAD
async function load(){
let r=await fetch(API,{method:"POST",body:JSON.stringify({action:"getStatus",token})});
let d=await r.json();

balance.innerText=d.balance;
circle.innerText=d.balance;

last=d.lastMining;

if(Date.now()-last<86400000){
  mining=true;
  mineBtn.innerText="Mining Active";
  circle.classList.add("active");
}

startTimer();
}

// START MINING
async function startMining(){
if(mining) return;

let r=await fetch(API,{method:"POST",body:JSON.stringify({action:"startMining",token})});
let d=await r.json();

if(!d.error){
 mining=true;
 mineBtn.innerText="Mining Active";
 circle.classList.add("active");
 last=Date.now();
}
}

// TIMER
function startTimer(){
setInterval(()=>{
 if(!last) return;

 let diff=86400000-(Date.now()-last);

 if(diff<=0){
   timer.innerText="Ready to Claim";
   mineBtn.innerText="Claim Reward";
   mining=false;
   return;
 }

 let h=Math.floor(diff/3600000);
 let m=Math.floor((diff%3600000)/60000);
 let s=Math.floor((diff%60000)/1000);

 timer.innerText=`${h}h ${m}m ${s}s`;
},1000);
}

// DRAWER
function toggleDrawer(){
 drawer.classList.toggle("active");
}

// NAV
function showHome(){}
function showProfile(){ alert("Profile UI next step"); }
function showWithdraw(){ alert("Withdraw UI next step"); }

function logout(){
 localStorage.removeItem("token");
 location.reload();
}

if(token) load();
</script>

</body>
</html>
