<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RIDA NETWORK V6</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0a0f1f,#0f1c3f);
  color:#fff;
}

/* HEADER */
.header{
  padding:15px;
  text-align:center;
  font-size:20px;
  background:#111a3a;
}

/* SCREEN */
.screen{display:none;padding-bottom:70px;}
.active{display:block;}

/* CARD */
.card{
  background:#111a3a;
  margin:12px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 0 10px rgba(0,200,255,0.2);
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#00c6ff,#0072ff);
  color:#fff;
  font-weight:bold;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-around;
  position:fixed;
  bottom:0;
  width:100%;
  background:#111a3a;
  padding:10px 0;
}

.nav button{
  background:none;
  color:#fff;
}

/* BALANCE */
.balance{
  font-size:28px;
  text-align:center;
  text-shadow:0 0 10px #00c6ff;
}
</style>
</head>

<body>

<div class="header">⚡ RIDA NETWORK</div>

<!-- AUTH -->
<div id="auth" class="screen active">
  <div class="card">
    <input id="email" placeholder="Email">
    <input id="password" placeholder="Password">
    <input id="ref" placeholder="Referral UID (optional)">
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="screen">

  <!-- HOME -->
  <div id="home" class="tab active">
    <div class="card">
      <div class="balance">💰 <span id="bal">0</span></div>
    </div>

    <div class="card">
      ⛏ Mining Time: <span id="timer">0</span>s
      <button onclick="startMining()">Start Mining</button>
      <button onclick="claimMining()">Claim</button>
    </div>
  </div>

  <!-- REF -->
  <div id="refTab" class="tab">
    <div class="card">
      UID: <span id="uid"></span><br>
      Referrals: <span id="refCount"></span><br>
      Earnings: <span id="refEarn"></span>
    </div>
  </div>

  <!-- WALLET -->
  <div id="wallet" class="tab">
    <div class="card">
      <input id="toUID" placeholder="Receiver UID">
      <input id="amount" placeholder="Amount">
      <button onclick="transfer()">Send</button>
    </div>
  </div>

  <!-- ADMIN -->
  <div id="admin" class="tab">
    <div class="card">
      <button onclick="loadUsers()">Load Users</button>
      <div id="users"></div>
    </div>
  </div>

</div>

<!-- NAV -->
<div class="nav" id="nav" style="display:none;">
  <button onclick="showTab('home')">🏠</button>
  <button onclick="showTab('refTab')">👥</button>
  <button onclick="showTab('wallet')">💸</button>
  <button id="adminBtn" onclick="showTab('admin')">⚙️</button>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxhiHRlpAh-fxwSnFTHlo3aNp0W_Z--0VzYKhVuN3n45q-yoMt6wMxV7uUYadjN9-Dp/exec";

let state={
  token:localStorage.getItem("token"),
  user:null,
  timerInterval:null
};

// API CALL
async function api(p){
  const url=API+"?"+new URLSearchParams(p);
  const res=await fetch(url);
  return await res.json();
}

// AUTH
async function register(){
  let r=await api({
    action:"register",
    email:email.value.trim(),
    password:password.value.trim(),
    ref:ref.value.trim()
  });
  alert(JSON.stringify(r));
}

async function login(){
  let r=await api({
    action:"login",
    email:email.value.trim(),
    password:password.value.trim()
  });

  if(r.success){
    localStorage.setItem("token",r.token);
    state.token=r.token;
    init();
  }else alert(r.error);
}

// INIT
async function init(){
  let r=await api({action:"getStatus",token:state.token});

  if(!r.success){
    localStorage.removeItem("token");
    location.reload();
    return;
  }

  state.user=r;

  auth.classList.remove("active");
  app.classList.add("active");
  nav.style.display="flex";

  bal.innerText=r.balance;
  uid.innerText=r.userId;
  refCount.innerText=r.refCount;
  refEarn.innerText=r.refEarnings;

  // ADMIN HIDE
  if(r.role!=="admin"){
    adminBtn.style.display="none";
  }

  // LIVE MINING TIMER
  startTimer(r.miningTime);
}

// TIMER
function startTimer(t){
  clearInterval(state.timerInterval);

  let time=parseInt(t||0);

  state.timerInterval=setInterval(()=>{
    time++;
    timer.innerText=time;
  },1000);
}

// NAV
function showTab(id){
  document.querySelectorAll(".tab").forEach(t=>t.style.display="none");
  document.getElementById(id).style.display="block";
}

// ACTIONS
async function startMining(){
  await api({action:"startMining",token:state.token});
}

async function claimMining(){
  await api({action:"claimMining",token:state.token});
  init();
}

async function transfer(){
  let r=await api({
    action:"transfer",
    token:state.token,
    toUID:toUID.value,
    amount:amount.value
  });
  alert(JSON.stringify(r));
}

// ADMIN
async function loadUsers(){
  let r=await api({action:"getUsers",token:state.token});
  users.innerText=JSON.stringify(r.users,null,2);
}

// AUTO LOGIN
if(state.token){
  init();
}

</script>

</body>
</html>
