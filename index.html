<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RIDA NETWORK V4</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0a0f1f;
  color:#fff;
}

/* HEADER */
.header{
  padding:15px;
  font-size:20px;
  font-weight:bold;
  background:#111a3a;
  text-align:center;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-around;
  background:#111a3a;
  position:fixed;
  bottom:0;
  width:100%;
  padding:10px 0;
}

.nav button{
  background:none;
  color:#fff;
  border:none;
  font-size:16px;
}

/* CARD */
.card{
  background:linear-gradient(135deg,#111a3a,#0c1440);
  margin:12px;
  padding:15px;
  border-radius:18px;
  box-shadow:0 0 15px rgba(0,200,255,0.2);
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
}

button.action{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#00c6ff,#0072ff);
  color:#fff;
  font-weight:bold;
}

/* SCREENS */
.screen{display:none;padding-bottom:70px;}
.active{display:block;}

.center{text-align:center;}

.glow{
  font-size:28px;
  text-shadow:0 0 10px #00c6ff;
}
</style>
</head>

<body>

<div class="header">⚡ RIDA NETWORK</div>

<!-- AUTH -->
<div id="auth" class="screen active">
  <div class="card">
    <input id="email" placeholder="Email">
    <input id="password" placeholder="Password">
    <button class="action" onclick="register()">Register</button>
    <button class="action" onclick="login()">Login</button>
  </div>
</div>

<!-- HOME -->
<div id="home" class="screen">
  <div class="card center">
    <div class="glow">💰 <span id="bal">0</span></div>
    <p>Balance</p>
  </div>

  <div class="card center">
    <button class="action" onclick="startMining()">⛏ Start Mining</button>
    <button class="action" onclick="claimMining()">🎁 Claim</button>
  </div>
</div>

<!-- REFERRAL -->
<div id="ref" class="screen">
  <div class="card center">
    <h3>👥 Referral System</h3>
    <p>Your UID:</p>
    <div id="uidBox"></div>
    <p>Referrals: <span id="refCount">0</span></p>
    <p>Earnings: <span id="refEarn">0</span></p>
  </div>
</div>

<!-- TRANSFER -->
<div id="wallet" class="screen">
  <div class="card">
    <input id="toUID" placeholder="Receiver UID">
    <input id="amount" placeholder="Amount">
    <button class="action" onclick="transfer()">Send</button>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="screen">
  <div class="card">
    <input id="msg">
    <button class="action" onclick="sendMsg()">Send</button>
    <div id="chatBox"></div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="screen">
  <div class="card">
    <h3>🛠 Admin Panel</h3>
    <button class="action" onclick="loadUsers()">Load Users</button>
    <div id="users"></div>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="show('home')">🏠</button>
  <button onclick="show('ref')">👥</button>
  <button onclick="show('wallet')">💸</button>
  <button onclick="show('chat')">💬</button>
  <button onclick="show('admin')">⚙️</button>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbydx68s5bKYrYB2w66DcKCBNziLsUG9dFNoKT7w7Ln1VAaoUqwKu5V3BNCP7MfmHy4/exec";

let token=localStorage.getItem("token");

// API
async function api(p){
  let url=API+"?"+new URLSearchParams(p);
  let r=await fetch(url);
  return await r.json();
}

// NAVIGATION
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// AUTH
async function register(){
  alert(JSON.stringify(await api({
    action:"register",
    email:email.value,
    password:password.value
  })));
}

async function login(){
  let r=await api({
    action:"login",
    email:email.value,
    password:password.value
  });

  if(r.success){
    token=r.token;
    localStorage.setItem("token",token);
    start();
  }else alert(r.error);
}

function start(){
  show("home");
  load();
}

// LOAD
async function load(){
  let r=await api({action:"getStatus",token});

  bal.innerText=r.balance;
  uidBox.innerText=r.userId;
  refCount.innerText=r.refCount;
  refEarn.innerText=r.refEarnings;

  if(r.role!="admin"){
    document.querySelector("button[onclick=\"show('admin')\"]").style.display="none";
  }

  loadChat();
}

// MINING
async function startMining(){
  alert(JSON.stringify(await api({action:"startMining",token})));
}

async function claimMining(){
  alert(JSON.stringify(await api({action:"claimMining",token})));
  load();
}

// TRANSFER
async function transfer(){
  alert(JSON.stringify(await api({
    action:"transfer",
    token,
    toUID:toUID.value,
    amount:amount.value
  })));
}

// CHAT
async function sendMsg(){
  await api({action:"sendMessage",token,msg:msg.value});
  msg.value="";
  loadChat();
}

async function loadChat(){
  let r=await api({action:"getMessages",token});
  chatBox.innerHTML=r.messages.join("<br>");
}

// ADMIN
async function loadUsers(){
  let r=await api({action:"getUsers",token});
  users.innerHTML=JSON.stringify(r.users);
}

// AUTO LOGIN
if(token) start();

</script>

</body>
</html>
