<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rida Mining Pro</title>
<style>
body{margin:0;font-family:Arial;background:#0b0e1c;color:#fff;}
.container{max-width:450px;margin:auto;padding:20px;}
.card{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);padding:20px;border-radius:15px;margin-top:20px;}
input,button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;}
input{background:rgba(255,255,255,0.1);color:#fff;}
button{background:#4cafef;color:#fff;font-weight:bold;cursor:pointer;}
button:hover{opacity:0.8;}
.hidden{display:none;}
.balance{font-size:30px;font-weight:bold;text-align:center;}
.mining{text-align:center;margin-top:20px;}
.countdown{font-size:16px;color:#0f0;text-align:center;margin-top:10px;}
.referral{word-break:break-all;font-size:14px;color:#4cafef;margin-top:10px;}
</style>
</head>
<body>

<div class="container">
<h2 style="text-align:center;">⛏️ Rida Mining Pro</h2>

<!-- LOGIN -->
<div id="loginBox" class="card">
<input id="email" placeholder="Email">
<input id="name" placeholder="Name">
<button onclick="register()">Login / Register</button>
</div>

<!-- DASHBOARD -->
<div id="app" class="hidden">

<div class="card">
<div class="balance" id="balance">0</div>
<p style="text-align:center;">Balance</p>
</div>

<div class="card mining">
<p id="status">Idle</p>
<button id="mineBtn" onclick="startMining()">Start Mining</button>
<div class="countdown" id="timer"></div>
</div>

<div class="card">
<p>Your referral link:</p>
<div class="referral" id="referralLink"></div>
</div>

<div class="card">
<input id="tx" placeholder="Enter TX ID">
<button onclick="submitTx()">Submit TX</button>
</div>

</div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbz3Gk44B1jk0CvUOLIiOGld0zJh379gyuf2CWysFvKQ24Akz1jn63KUxqisZGFxFTxLNg/exec";
let user = null;
let miningTimer = null;

// =======================
// POST API
// =======================
async function post(data){
  try{
    const res = await fetch(API,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(data)});
    let text = await res.text();
    text = text.trim();
    if(text.startsWith(")]}'")) text=text.substring(4);
    return JSON.parse(text);
  }catch(e){alert("Network error"); return {};}
}

// =======================
// REGISTER / LOGIN
// =======================
async function register(){
  const email = document.getElementById("email").value;
  const name = document.getElementById("name").value;
  if(!email){alert("Enter email");return;}

  await post({action:"registerUser", email, name});
  const data = await post({action:"getUser", email});
  if(data.status==="success"){
    user = data.user;
    localStorage.setItem("email",email);
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    updateUI();
    startMining(true); // instant mining
  }else alert("Login failed");
}

// =======================
// UPDATE UI
// =======================
function updateUI(){
  document.getElementById("balance").innerText = user[4];
  const referral = `https://yourdomain.com/?ref=${user[6]}`;
  document.getElementById("referralLink").innerText = referral;
}

// =======================
// START MINING
// =======================
async function startMining(auto=false){
  if(!user){alert("Login first");return;}

  document.getElementById("mineBtn").disabled = true;
  document.getElementById("status").innerText = "Mining Active ⛏️";

  const res = await post({action:"checkIn", userId:user[0]});

  if(res.status==="success"){
    user[4] = res.balance;
    updateUI();
    startCountdown();
  }else if(res.status==="wait"){alert("Mining cooldown 24h");}
  else if(res.status==="not_verified" && !auto){alert("Not verified");}
  else if(res.status==="ended"){alert("Mining supply ended");}

  if(!miningTimer) startCountdown();
}

// =======================
// COUNTDOWN TIMER
// =======================
function startCountdown(){
  const timerEl = document.getElementById("timer");
  let end = new Date().getTime() + 24*60*60*1000; // 24h
  miningTimer = setInterval(()=>{
    let now = new Date().getTime();
    let diff = end - now;
    if(diff<=0){clearInterval(miningTimer);timerEl.innerText="Mine Again ⏳";document.getElementById("mineBtn").disabled=false;}
    else{
      let h=Math.floor(diff/3600000);
      let m=Math.floor((diff%3600000)/60000);
      let s=Math.floor((diff%60000)/1000);
      timerEl.innerText=`Next mining in ${h}h ${m}m ${s}s`;
    }
  },1000);
}

// =======================
// SUBMIT TX
// =======================
async function submitTx(){
  const tx = document.getElementById("tx").value;
  if(!tx){alert("Enter TX ID"); return;}
  const res = await post({action:"submitTx", userId:user[0], email:user[1], tx});
  if(res.status==="submitted"){alert("TX Submitted");}else{alert("Error");}
}

// =======================
// AUTO LOGIN
// =======================
window.onload = async ()=>{
  const saved = localStorage.getItem("email");
  if(saved){
    const data = await post({action:"getUser", email:saved});
    if(data.status==="success"){
      user = data.user;
      document.getElementById("loginBox").classList.add("hidden");
      document.getElementById("app").classList.remove("hidden");
      updateUI();
      startMining(true); // auto start
    }
  }
}
</script>

</body>
</html>
