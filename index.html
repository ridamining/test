<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIDA NETWORK</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0c0f1d;
  color:#fff;
}

/* HEADER */
.header{
  padding:15px;
  text-align:center;
  font-weight:bold;
  font-size:18px;
  background:#111;
}

/* CARDS */
.card{
  margin:12px;
  padding:15px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
}

/* BALANCE */
.balance{
  font-size:28px;
  text-align:center;
}

/* MINING BUTTON */
.mine-btn{
  width:100%;
  padding:15px;
  border:none;
  border-radius:50px;
  font-size:18px;
  background:linear-gradient(45deg,#00f2ff,#0066ff);
  color:#fff;
}

/* COUNTER */
.counter{
  text-align:center;
  font-size:20px;
  margin:10px 0;
}

/* NAVBAR */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.nav div{
  flex:1;
  text-align:center;
  padding:10px;
  cursor:pointer;
}

/* PAGES */
.page{display:none;}
.active{display:block;}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  color:#fff;
  width:100%;
}
</style>
</head>

<body>

<div class="header">RIDA NETWORK</div>

<!-- HOME -->
<div id="home" class="page active">

  <div class="card">
    <b>📢 Broadcast</b>
    <p id="broadcast"></p>
  </div>

  <div class="card balance">
    <div>Balance</div>
    <div id="balance">0</div>
  </div>

  <div class="card">
    <div class="counter" id="counter">Loading...</div>
    <button id="mineBtn" class="mine-btn" onclick="startMining()">Start Mining</button>
    <button onclick="claim()">Claim Reward</button>
  </div>

</div>

<!-- WALLET -->
<div id="wallet" class="page">
  <div class="card">
    <input id="amount" placeholder="Amount">
    <input id="walletAddr" placeholder="Wallet Address">
    <button onclick="withdraw()">Withdraw</button>
  </div>
</div>

<!-- PROFILE -->
<div id="profile" class="page">
  <div class="card">
    <p>Email: <span id="pEmail"></span></p>
    <p>User ID: <span id="pId"></span></p>
    <p>KYC: <span id="pKyc"></span></p>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
  <div class="card">
    <button onclick="loadUsers()">Load Users</button>
    <div id="users"></div>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="showPage('home')">🏠</div>
  <div onclick="showPage('wallet')">💰</div>
  <div onclick="showPage('profile')">👤</div>
  <div onclick="showPage('admin')">👑</div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzFwjQRnPDSlvqyHwYSiqFkqEZB73YAEK7R5ToKpO9VRkx_x5ZkpCC0kM2GHilQ0tYS/exec";

let token=localStorage.getItem("token");
let miningActive=false;

// NAVIGATION
function showPage(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.getElementById(p).classList.add("active");
}

// LOAD DATA
async function load(){
  let r=await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"getStatus",token})
  });
  let d=await r.json();

  balance.innerText=d.balance;
  broadcast.innerText=d.broadcast;

  pEmail.innerText=d.email;
  pId.innerText=d.userId;
  pKyc.innerText=d.kycStatus;

  const now=Date.now();
  const last=d.lastMining;

  if(now-last<86400000){
    miningActive=true;
    mineBtn.innerText="Mining Active";
    startTimer(last);
  }else{
    counter.innerText="Ready to start";
  }

  if(d.role!=="admin"){
    document.querySelector('[onclick="showPage(\'admin\')"]').style.display="none";
  }
}

// TIMER
function startTimer(last){
  setInterval(()=>{
    let remain=86400000-(Date.now()-last);

    if(remain<=0){
      counter.innerText="Ready to claim";
      miningActive=false;
      mineBtn.innerText="Start Mining";
      return;
    }

    let h=Math.floor(remain/3600000);
    let m=Math.floor((remain%3600000)/60000);
    let s=Math.floor((remain%60000)/1000);

    counter.innerText=`${h}h ${m}m ${s}s`;
  },1000);
}

// MINING
async function startMining(){
  if(miningActive){alert("Already active");return;}

  let r=await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"startMining",token})
  });

  let d=await r.json();

  if(d.success){
    miningActive=true;
    mineBtn.innerText="Mining Active";
    startTimer(Date.now());
  }
}

// CLAIM
async function claim(){
  if(miningActive){alert("Not ready");return;}

  let r=await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"claimMining",token})
  });

  let d=await r.json();
  if(d.success){
    balance.innerText=d.balance;
  }
}

// WITHDRAW
async function withdraw(){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"withdraw",
      token,
      amount:parseFloat(amount.value),
      wallet:walletAddr.value
    })
  });
  alert("Requested");
}

// ADMIN
async function loadUsers(){
  let r=await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"getUsers",token})
  });

  let d=await r.json();

  users.innerHTML="";
  d.users.slice(1).forEach(u=>{
    users.innerHTML+=`
      <div class="card">
        ${u[1]} | ${u[4]} | ${u[7]}
        <button onclick="verify('${u[0]}')">Verify</button>
      </div>
    `;
  });
}

async function verify(id){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"updateKYC",
      token,
      userId:id,
      status:"verified"
    })
  });
  loadUsers();
}

// INIT
if(token){load();}

</script>

</body>
</html>
