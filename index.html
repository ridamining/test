<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rida Mining</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:#fff;
}

.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
}

input,button{
  width:100%;
  padding:12px;
  margin:5px 0;
  border:none;
  border-radius:8px;
}

button{
  background:#06b6d4;
  color:#fff;
  font-weight:bold;
}

h2{text-align:center;}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#020617;
}

.nav button{
  flex:1;
  background:none;
  color:#fff;
}

.hidden{display:none;}

.mining{
  text-align:center;
  font-size:22px;
  color:#22c55e;
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0.5;}
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="auth">
<h2>Rida Mining</h2>
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="ref" placeholder="Referral Code (optional)">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="app" class="hidden">

<div class="card">
<h3>Welcome</h3>
<p id="userEmail"></p>
<p>Balance: <span id="balance">0</span></p>
<p>Status: <span id="status"></span></p>
</div>

<div class="card">
<h3>Mining</h3>
<div id="miningStatus">Inactive</div>
<button onclick="startMining()">Start Mining</button>
</div>

<div class="card">
<h3>Referral</h3>
<p id="refLink"></p>
</div>

<div class="card">
<h3>Broadcast</h3>
<div id="broadcast"></div>
</div>

<div class="card">
<h3>Chat</h3>
<div id="chatBox" style="height:120px;overflow:auto;"></div>
<input id="msg">
<button onclick="sendMsg()">Send</button>
</div>

</div>

</div>

<div class="nav hidden" id="nav">
<button onclick="show('home')">Home</button>
<button onclick="logout()">Logout</button>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycby7dnjsLTLx4o_IVTrmA3wg08xG8VVDmnEEOzNmDR64wiWHpodLPv_rYSMKG_gOXCuVzA/exec";

let user=null;

// =====================
// REGISTER
// =====================
function register(){
fetch(API,{
method:"POST",
body:JSON.stringify({
action:"registerUser",
name:name.value,
email:email.value,
ref:ref.value
})
})
.then(r=>r.json())
.then(d=>{
alert(d.status);
});
}

// =====================
// LOGIN
// =====================
function login(){
fetch(API,{
method:"POST",
body:JSON.stringify({
action:"getUser",
email:email.value
})
})
.then(r=>r.json())
.then(d=>{
if(d.status==="success"){
user=d.user;
localStorage.setItem("user",JSON.stringify(user));
startApp();
}else{
alert("User not found");
}
});
}

// =====================
// START APP
// =====================
function startApp(){
document.getElementById("auth").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
document.getElementById("nav").classList.remove("hidden");

user=JSON.parse(localStorage.getItem("user"));

userEmail.innerText=user[1];
balance.innerText=user[4];
status.innerText=user[7];

refLink.innerText=location.origin+"?ref="+user[6];

loadBroadcast();
loadChat();

// AUTO mining
startMining();
}

// =====================
// MINING
// =====================
function startMining(){
miningStatus.innerHTML='<div class="mining">Mining Active ⚡</div>';

setInterval(()=>{
fetch(API,{
method:"POST",
body:JSON.stringify({
action:"checkIn",
userId:user[0]
})
})
.then(r=>r.json())
.then(d=>{
if(d.status==="success"){
balance.innerText=d.balance;
}
});
},5000);
}

// =====================
// BROADCAST
// =====================
function loadBroadcast(){
fetch(API,{
method:"POST",
body:JSON.stringify({action:"getBroadcasts"})
})
.then(r=>r.json())
.then(d=>{
if(d.status==="success"){
broadcast.innerHTML=d.data.map(x=>`<p>${x[1]}</p>`).join("");
}
});
}

// =====================
// CHAT
// =====================
function sendMsg(){
fetch(API,{
method:"POST",
body:JSON.stringify({
action:"sendMessage",
userId:user[0],
msg:msg.value
})
});
msg.value="";
}

function loadChat(){
setInterval(()=>{
fetch(API,{
method:"POST",
body:JSON.stringify({
action:"getMessages",
userId:user[0]
})
})
.then(r=>r.json())
.then(d=>{
if(d.status==="success"){
chatBox.innerHTML=d.data.map(x=>`<p>${x[3]}</p>`).join("");
}
});
},3000);
}

// =====================
// LOGOUT
// =====================
function logout(){
localStorage.clear();
location.reload();
}

// AUTO LOGIN
if(localStorage.getItem("user")){
startApp();
}
</script>

</body>
</html>
