<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RIDA OS | SUPREME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style id="theme-css">
        :root { --main: #3b82f6; --bg: #020617; --glass: rgba(15, 23, 42, 0.8); }
    </style>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: white; -webkit-tap-highlight-color: transparent; transition: background 0.5s ease; overflow-x: hidden; }
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .active-nav { color: var(--main) !important; transform: scale(1.2); }
        .hidden { display: none !important; }
        .mining-ring { border: 4px solid #0f172a; border-top-color: var(--main); animation: spin 2s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-32">

    <div id="authPage" class="min-h-screen flex items-center justify-center p-6">
        <div class="glass w-full max-w-sm p-10 rounded-[3rem] text-center border-t border-white/10 shadow-2xl">
            <h1 class="text-4xl font-black italic text-blue-500 mb-2">RIDA</h1>
            <p id="authLabel" class="text-[10px] font-black opacity-50 uppercase tracking-[0.3em] mb-10">System Access</p>
            
            <div id="regDiv" class="hidden space-y-4 mb-4">
                <input type="text" id="regName" class="w-full bg-slate-900/50 p-4 rounded-2xl border border-white/5 outline-none" placeholder="Full Name">
            </div>
            <input type="email" id="authEmail" class="w-full bg-slate-900/50 p-4 rounded-2xl mb-4 border border-white/5 outline-none" placeholder="Node Email">
            <input type="password" id="authPass" class="w-full bg-slate-900/50 p-4 rounded-2xl mb-10 border border-white/5 outline-none" placeholder="Master Key">
            
            <button onclick="processAuth()" class="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-all">Initialize</button>
            <p onclick="toggleAuth()" class="mt-8 text-[10px] font-black text-slate-500 uppercase cursor-pointer hover:text-blue-400">New? <span id="toggleTxt">Create Account</span></p>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="p-6 flex justify-between items-center sticky top-0 z-50 glass rounded-b-3xl">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg flex items-center justify-center text-white" style="background: var(--main)">
                    <i data-lucide="layers" class="w-4 h-4"></i>
                </div>
                <h2 class="text-lg font-black italic">RIDA</h2>
            </div>
            <div class="text-right">
                <p id="hStatus" class="text-[8px] font-black uppercase px-2 py-1 rounded bg-white/5 tracking-widest">---</p>
                <p id="kstClock" class="text-[7px] font-bold text-slate-500 mt-1">KST 00:00</p>
            </div>
        </header>

        <main class="p-6 space-y-6">
            <div id="tab-mining" class="space-y-6 animate-in fade-in duration-500">
                <div class="glass p-10 rounded-[3rem] text-center border-t border-white/10 shadow-2xl">
                    <p class="text-[10px] font-black opacity-50 uppercase tracking-widest mb-2">Yield Balance</p>
                    <h2 class="text-5xl font-black tracking-tighter mb-8"><span id="balance">0.000000</span></h2>
                    <div id="ring" class="w-44 h-44 border-4 border-slate-900 rounded-full mx-auto mb-8 flex items-center justify-center">
                        <div class="text-center">
                            <span id="timer" class="text-3xl font-black">24:00:00</span>
                            <p class="text-[8px] font-bold opacity-50 uppercase">Session</p>
                        </div>
                    </div>
                    <button id="mineBtn" onclick="startMining()" class="w-full py-6 rounded-3xl font-black uppercase text-xs tracking-widest text-white shadow-xl active:scale-95 transition-all" style="background: var(--main)">Start Mining</button>
                </div>
            </div>

            <div id="tab-admin" class="hidden space-y-6 animate-in slide-in-from-top duration-500">
                <h2 class="text-2xl font-black text-blue-500 italic uppercase">System Root</h2>
                
                <div class="glass p-6 rounded-3xl">
                    <p class="text-[10px] font-black uppercase opacity-50 mb-4">UI Environment</p>
                    <div class="flex gap-3 overflow-x-auto pb-2">
                        <div onclick="setTheme('blue')" class="w-10 h-10 rounded-full bg-blue-600 border-2 border-white"></div>
                        <div onclick="setTheme('gold')" class="w-10 h-10 rounded-full bg-amber-500"></div>
                        <div onclick="setTheme('emerald')" class="w-10 h-10 rounded-full bg-emerald-500"></div>
                        <div onclick="setTheme('crimson')" class="w-10 h-10 rounded-full bg-red-600"></div>
                        <div onclick="setTheme('purple')" class="w-10 h-10 rounded-full bg-purple-600"></div>
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <p class="text-[10px] font-black uppercase opacity-50">Manage Node Network</p>
                        <button onclick="syncSheetData()" class="p-2 bg-white/5 rounded-lg"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
                    </div>
                    <div id="admin-user-list" class="space-y-3">
                        </div>
                </div>
            </div>

            <div id="tab-profile" class="hidden space-y-4 animate-in slide-in-from-right duration-500">
                <div class="glass p-10 rounded-[3rem] text-center border-t border-white/5">
                    <img id="pAvatar" class="w-20 h-20 mx-auto rounded-3xl mb-4 p-1 border-2" style="border-color: var(--main)">
                    <h3 id="pName" class="font-black text-xl uppercase tracking-widest">---</h3>
                    <p id="pEmail" class="text-xs text-slate-500 mb-6">---</p>
                    <div class="grid grid-cols-2 gap-2 text-left">
                        <div class="bg-black/20 p-4 rounded-2xl">
                            <p class="text-[7px] font-black uppercase opacity-50">Node ID</p>
                            <p id="pUID" class="text-[10px] font-black italic">---</p>
                        </div>
                        <div onclick="logout()" class="bg-red-500/10 p-4 rounded-2xl flex flex-col justify-center items-center cursor-pointer border border-red-500/20">
