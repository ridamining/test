<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rida Mining</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0c0f1c;
  color:#fff;
}
.container{
  max-width:400px;
  margin:auto;
  padding:20px;
}
.card{
  background:#151a2e;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}
input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}
input{
  background:#1f2642;
  color:#fff;
}
button{
  background:#4cafef;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
button:hover{
  opacity:0.8;
}
.hidden{display:none}
.balance{
  font-size:28px;
  font-weight:bold;
  text-align:center;
}
.mining{
  text-align:center;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h2 style="text-align:center;">⛏️ Rida Mining</h2>

<!-- LOGIN -->
<div id="loginBox" class="card">
<input id="email" placeholder="Email">
<input id="name" placeholder="Name">
<button onclick="register()">Login / Register</button>
</div>

<!-- DASHBOARD -->
<div id="app" class="hidden">

<div class="card">
<div class="balance" id="balance">0</div>
<p style="text-align:center;">Balance</p>
</div>

<div class="card mining">
<p id="status">Idle</p>
<button onclick="startMining()">Start Mining</button>
</div>

<div class="card">
<input id="tx" placeholder="Enter TX ID">
<button onclick="submitTx()">Submit TX</button>
</div>

</div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbz3Gk44B1jk0CvUOLIiOGld0zJh379gyuf2CWysFvKQ24Akz1jn63KUxqisZGFxFTxLNg/exec";

let user = null;

// =======================
// API CALL
// =======================
async function post(data){
  try{
    const res = await fetch(API,{
      method:"POST",
      headers:{ "Content-Type":"text/plain;charset=utf-8" },
      body: JSON.stringify(data)
    });

    let text = await res.text();
    text = text.trim();

    if(text.startsWith(")]}'")){
      text = text.substring(4);
    }

    return JSON.parse(text);

  }catch(e){
    alert("Network error");
    return {};
  }
}

// =======================
// REGISTER / LOGIN
// =======================
async function register(){
  const email = document.getElementById("email").value;
  const name = document.getElementById("name").value;

  if(!email){
    alert("Enter email");
    return;
  }

  let res = await post({
    action:"registerUser",
    email:email,
    name:name
  });

  let data = await post({
    action:"getUser",
    email:email
  });

  if(data.status==="success"){
    user = data.user;

    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");

    updateUI();
  }else{
    alert("Login failed");
  }
}

// =======================
// UPDATE UI
// =======================
function updateUI(){
  document.getElementById("balance").innerText = user[4];
}

// =======================
// MINING
// =======================
async function startMining(){
  if(!user){
    alert("Login first");
    return;
  }

  document.getElementById("status").innerText = "Mining...";

  let res = await post({
    action:"checkIn",
    userId:user[0]
  });

  if(res.status==="success"){
    user[4] = res.balance;
    updateUI();
    alert("Reward Added");
  }
  else if(res.status==="wait"){
    alert("Come back tomorrow");
  }
  else if(res.status==="not_verified"){
    alert("Account not verified");
  }
  else{
    alert("Mining stopped");
  }

  document.getElementById("status").innerText = "Idle";
}

// =======================
// SUBMIT TX
// =======================
async function submitTx(){
  const tx = document.getElementById("tx").value;

  if(!tx){
    alert("Enter TX ID");
    return;
  }

  let res = await post({
    action:"submitTx",
    userId:user[0],
    email:user[1],
    tx:tx
  });

  if(res.status==="submitted"){
    alert("Submitted");
  }else{
    alert("Error");
  }
}

// =======================
// AUTO LOGIN
// =======================
window.onload = async ()=>{
  const saved = localStorage.getItem("email");

  if(saved){
    let data = await post({
      action:"getUser",
      email:saved
    });

    if(data.status==="success"){
      user = data.user;

      document.getElementById("loginBox").classList.add("hidden");
      document.getElementById("app").classList.remove("hidden");

      updateUI();
    }
  }
}
</script>

</body>
</html>
