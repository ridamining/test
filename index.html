<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RIDA NETWORK</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0a0f1f;
  color:#fff;
}

/* HEADER */
.header{
  padding:15px;
  background:#111a3a;
  text-align:center;
  font-weight:bold;
}

/* SCREENS */
.screen{display:none;padding-bottom:70px;}
.active{display:block;}

/* CARD */
.card{
  background:#111a3a;
  margin:12px;
  padding:15px;
  border-radius:15px;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  color:#fff;
  font-weight:bold;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-around;
  position:fixed;
  bottom:0;
  width:100%;
  background:#111a3a;
  padding:10px 0;
}

.nav button{
  background:none;
  color:#fff;
  font-size:14px;
}
</style>
</head>

<body>

<div class="header">⚡ RIDA NETWORK</div>

<!-- AUTH -->
<div id="auth" class="screen active">
  <div class="card">
    <input id="email" placeholder="Email">
    <input id="password" placeholder="Password">
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="screen">

  <div id="home" class="tab active">
    <div class="card">
      Balance: <span id="bal">0</span>
    </div>
    <div class="card">
      <button onclick="startMining()">Start Mining</button>
      <button onclick="claimMining()">Claim</button>
    </div>
  </div>

  <div id="ref" class="tab">
    <div class="card">
      UID: <span id="uid"></span><br>
      Referrals: <span id="refCount"></span><br>
      Earnings: <span id="refEarn"></span>
    </div>
  </div>

  <div id="wallet" class="tab">
    <div class="card">
      <input id="toUID" placeholder="Receiver UID">
      <input id="amount" placeholder="Amount">
      <button onclick="transfer()">Send</button>
    </div>
  </div>

  <div id="admin" class="tab">
    <div class="card">
      <button onclick="loadUsers()">Load Users</button>
      <div id="users"></div>
    </div>
  </div>

</div>

<!-- NAV -->
<div class="nav" id="nav" style="display:none;">
  <button onclick="showTab('home')">🏠</button>
  <button onclick="showTab('ref')">👥</button>
  <button onclick="showTab('wallet')">💸</button>
  <button id="adminBtn" onclick="showTab('admin')">⚙️</button>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbydx68s5bKYrYB2w66DcKCBNziLsUG9dFNoKT7w7Ln1VAaoUqwKu5V3BNCP7MfmHy4/exec";

let state = {
  token: localStorage.getItem("token"),
  user: null
};

// API
async function api(params){
  const url = API + "?" + new URLSearchParams(params);
  const res = await fetch(url);
  return await res.json();
}

// SCREEN CONTROL
function showApp(){
  auth.classList.remove("active");
  app.classList.add("active");
  nav.style.display="flex";
}

function logout(){
  localStorage.removeItem("token");
  location.reload();
}

// TABS
function showTab(id){
  document.querySelectorAll(".tab").forEach(t=>t.style.display="none");
  document.getElementById(id).style.display="block";
}

// AUTH
async function register(){
  let r=await api({
    action:"register",
    email:email.value.trim(),
    password:password.value.trim()
  });
  alert(JSON.stringify(r));
}

async function login(){
  let r=await api({
    action:"login",
    email:email.value.trim(),
    password:password.value.trim()
  });

  if(r.success){
    state.token=r.token;
    localStorage.setItem("token",r.token);
    init();
  }else{
    alert(r.error);
  }
}

// INIT
async function init(){
  let r=await api({action:"getStatus",token:state.token});

  if(!r.success){
    logout();
    return;
  }

  state.user=r;

  showApp();

  bal.innerText=r.balance;
  uid.innerText=r.userId;
  refCount.innerText=r.refCount;
  refEarn.innerText=r.refEarnings;

  // ADMIN PROTECTION
  if(r.role !== "admin"){
    adminBtn.style.display="none";
  }
}

// ACTIONS
async function startMining(){
  alert(JSON.stringify(await api({action:"startMining",token:state.token})));
}

async function claimMining(){
  alert(JSON.stringify(await api({action:"claimMining",token:state.token})));
  init();
}

async function transfer(){
  alert(JSON.stringify(await api({
    action:"transfer",
    token:state.token,
    toUID:toUID.value,
    amount:amount.value
  })));
}

// ADMIN
async function loadUsers(){
  let r=await api({action:"getUsers",token:state.token});
  users.innerText=JSON.stringify(r.users);
}

// AUTO LOGIN
if(state.token){
  init();
}

</script>

</body>
</html>
