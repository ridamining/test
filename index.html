<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RIDA OS | PRO MAX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: white; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .mining-ring { border: 4px solid #0f172a; border-top-color: #3b82f6; animation: spin 2s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .bottom-nav { position: fixed; bottom: 24px; left: 24px; right: 24px; height: 70px; z-index: 100; display: flex; align-items: center; justify-content: space-around; }
        .active-tab { color: #3b82f6 !important; transition: all 0.3s; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="pb-32 overflow-x-hidden">

    <div id="loader" class="fixed inset-0 bg-[#020617] z-[200] flex flex-col items-center justify-center transition-opacity duration-500">
        <h1 class="text-4xl font-black italic text-blue-500 animate-pulse">RIDA</h1>
        <div class="w-12 h-1 w-48 bg-slate-900 mt-4 rounded-full overflow-hidden">
            <div class="h-full bg-blue-500 w-1/3 animate-[loading_2s_infinite]"></div>
        </div>
    </div>

    <div id="authPage" class="min-h-screen flex items-center justify-center p-6">
        <div class="glass w-full max-w-sm p-10 rounded-[3rem] text-center border-t border-blue-500/20 shadow-2xl">
            <h2 class="text-4xl font-black italic text-blue-500 mb-2 uppercase">Rida</h2>
            <p id="authModeLabel" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-10">Access Node</p>
            
            <div id="regDiv" class="hidden space-y-4 mb-4">
                <input type="text" id="regName" class="w-full bg-slate-900 p-4 rounded-2xl border border-white/5 outline-none" placeholder="Full Name">
            </div>
            <input type="email" id="authEmail" class="w-full bg-slate-900 p-4 rounded-2xl mb-4 border border-white/5 outline-none" placeholder="Node Email">
            <input type="password" id="authPass" class="w-full bg-slate-900 p-4 rounded-2xl mb-10 border border-white/5 outline-none" placeholder="Master Key">
            
            <button onclick="processAuth()" class="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-all">Initialize Connection</button>
            <p onclick="toggleAuth()" class="mt-8 text-[10px] font-black text-slate-500 uppercase cursor-pointer hover:text-blue-500">New Miner? <span id="authToggleText">Create Account</span></p>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="p-6 flex justify-between items-center sticky top-0 glass z-50 rounded-b-3xl">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600/10 rounded-xl flex items-center justify-center border border-blue-500/20">
                    <i data-lucide="layers" class="w-5 h-5 text-blue-500"></i>
                </div>
                <h2 class="text-xl font-black italic">RIDA</h2>
            </div>
            <div class="text-right">
                <p id="hStatus" class="text-[9px] font-black uppercase text-red-500 tracking-widest">Unverified</p>
                <p id="hUID" class="text-[8px] font-bold text-slate-500">--</p>
            </div>
        </header>

        <main class="p-6 space-y-6">
            <div id="tab-mining" class="space-y-6">
                <div class="bg-gradient-to-br from-blue-600 to-indigo-900 p-10 rounded-[3rem] shadow-2xl relative overflow-hidden border-t border-white/20">
                    <p class="text-[10px] font-black uppercase opacity-60 tracking-widest">Current Node Assets</p>
                    <h2 class="text-5xl font-black mt-2 tracking-tighter"><span id="balance">0.000000</span></h2>
                    <i data-lucide="zap" class="absolute -right-4 -bottom-4 w-32 h-32 opacity-10 rotate-12"></i>
                </div>

                <div class="glass p-12 rounded-[3.5rem] text-center shadow-inner">
                    <div id="timerRing" class="w-44 h-44 border-[6px] border-slate-900 rounded-full mx-auto mb-10 flex items-center justify-center">
                        <div class="text-center">
                            <span id="timer" class="text-3xl font-black">24:00:00</span>
                            <p class="text-[8px] font-bold text-slate-500 uppercase tracking-widest">Mining Session</p>
                        </div>
                    </div>
                    <button id="mineBtn" onclick="startMining()" class="w-full bg-blue-600 py-6 rounded-3xl font-black uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-all">Launch Mining Node</button>
                </div>
            </div>

            <div id="tab-social" class="hidden space-y-6">
                <h1 class="text-2xl font-black text-blue-500 italic uppercase">Social Hub</h1>
                <div class="glass p-6 rounded-3xl border-l-4 border-blue-500">
                    <p class="text-[10px] font-black text-blue-500 uppercase mb-2">Global Announcement</p>
                    <p class="text-xs font-bold text-slate-300">Welcome to the Pro Max network. Verified accounts earn 2x more rewards.</p>
                </div>
                </div>

            <div id="tab-profile" class="hidden space-y-4">
                <div class="glass p-10 rounded-[3rem] text-center border-t border-white/5">
                    <img id="pAvatar" class="w-24 h-24 rounded-[2.5rem] mx-auto mb-4 border-2 border-blue-500 p-1">
                    <h3 id="pName" class="font-black text-xl uppercase tracking-widest">--</h3>
                    <p id="pEmail" class="text-xs text-slate-500">--</p>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-slate-900/50 p-5 rounded-3xl border border-white/5">
                        <p class="text-[8px] font-black text-blue-500 uppercase mb-1">Status</p>
                        <p id="pStatus" class="text-xs font-black">--</p>
                    </div>
                    <div class="bg-slate-900/50 p-5 rounded-3xl border border-white/5">
                        <p class="text-[8px] font-black text-blue-500 uppercase mb-1">ID</p>
                        <p id="pUID_field" class="text-xs font-black">--</p>
                    </div>
                </div>
                <div class="glass p-6 rounded-3xl mt-4">
                    <p class="text-[9px] font-black text-slate-500 uppercase mb-4">Referral Link</p>
                    <div class="flex gap-2">
                        <input id="refIn" readonly class="flex-1 bg-slate-950 p-4 rounded-xl text-[10px] outline-none font-bold text-blue-400">
                        <button onclick="copyRef()" class="bg-blue-600 px-5 rounded-xl"><i data-lucide="copy" class="w-4 h-4"></i></button>
                    </div>
                </div>
            </div>

            <div id="tab-admin" class="hidden space-y-6">
                <div class="flex justify-between items-center">
                    <h1 class="text-2xl font-black text-blue-500">Root Control</h1>
                    <button onclick="fetchUsers()" class="p-2 bg-blue-600/20 rounded-lg text-blue-500"><i data-lucide="refresh-cw"></i></button>
                </div>
                <div id="adminList" class="space-y-4 pb-24"></div>
            </div>
        </main>
    </div>

    <nav id="bottomNav" class="bottom-nav glass rounded-[2.5rem] hidden">
        <button onclick="setTab('social')" id="nav-social" class="flex flex-col items-center gap-1 text-slate-500">
            <i data-lucide="globe" class="w-6 h-6"></i>
            <span class="text-[8px] font-black uppercase">Social</span>
        </button>
        <button onclick="setTab('mining')" id="nav-mining" class="w-20 h-20 bg-blue-600 rounded-full -translate-y-8 flex items-center justify-center border-4 border-[#020617] text-white shadow-xl shadow-blue-900/40">
            <i data-lucide="cpu" class="w-8 h-8"></i>
        </button>
        <button onclick="setTab('profile')" id="nav-profile" class="flex flex-col items-center gap-1 text-slate-500">
            <i data-lucide="user" class="w-6 h-6"></i>
            <span class="text-[8px] font-black uppercase">Me</span>
        </button>
    </nav>

    <script>
        // --- LOGIC ---
        const API = "YOUR_GOOGLE_SCRIPT_URL_HERE"; 
        let user = JSON.parse(localStorage.getItem('rida_v10'));
        let isRegMode = false;

        function initIcons() { lucide.createIcons(); }

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
            }, 1500);
            
            if(user) loadApp();
            initIcons();
        };

        function toggleAuth() {
            isRegMode = !isRegMode;
            document.getElementById('regDiv').classList.toggle('hidden', !isRegMode);
            document.getElementById('authModeLabel').innerText = isRegMode ? "Create Account" : "Access Node";
            document.getElementById('authToggleText').innerText = isRegMode ? "Sign In" : "Create Account";
        }

        function processAuth() {
            const email = document.getElementById('authEmail').value;
            const pass = document.getElementById('authPass').value;
            if(!email || !pass) return alert("Fill all fields");

            if(email === "adminrida@gmail.com" && pass === "CocoMomoPakistan@786") {
                user = { uid: "MASTER", name: "System Admin", email: email, balance: 999999, status: "Verified", role: "admin", joinDate: "01/01/2026" };
            } else {
                user = { 
                    uid: "RIDA-" + Math.floor(100000 + Math.random()*900000), 
                    name: document.getElementById('regName').value || "Miner", 
                    email: email, balance: 0, status: "Unverified", role: "user", joinDate: new Date().toLocaleDateString()
                };
            }
            localStorage.setItem('rida_v10', JSON.stringify(user));
            location.reload();
        }

        function loadApp() {
            document.getElementById('authPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('bottomNav').classList.remove('hidden');
            
            document.getElementById('hUID').innerText = user.uid;
            document.getElementById('hStatus').innerText = user.status;
            document.getElementById('balance').innerText = parseFloat(user.balance).toFixed(6);
            
            setTab('mining');
            checkMiningTimer();
        }

        function setTab(t) {
            ['mining', 'social', 'profile', 'admin'].forEach(tab => {
                document.getElementById('tab-' + tab)?.classList.toggle('hidden', tab !== t);
                document.getElementById('nav-' + tab)?.classList.toggle('active-tab', tab === t);
            });
            if(t === 'profile') renderProfile();
            if(t === 'admin' && user.role === 'admin') fetchUsers();
        }

        function renderProfile() {
            document.getElementById('pName').innerText = user.name;
            document.getElementById('pEmail').innerText = user.email;
            document.getElementById('pStatus').innerText = user.status;
            document.getElementById('pUID_field').innerText = user.uid;
            document.getElementById('pAvatar').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.email}`;
            document.getElementById('refIn').value = `${window.location.origin}/?ref=${user.uid}`;
        }

        function startMining() {
            const endTime = Date.now() + (24 * 60 * 60 * 1000);
            localStorage.setItem('rida_end', endTime);
            location.reload();
        }

        function checkMiningTimer() {
            const end = localStorage.getItem('rida_end');
            if(end) {
                const btn = document.getElementById('mineBtn');
                btn.innerText = "NODE ONLINE"; btn.disabled = true;
                btn.className = "w-full bg-slate-900 border border-blue-500/20 text-blue-500 py-6 rounded-3xl font-black text-xs uppercase";
                document.getElementById('timerRing').classList.add('mining-ring');

                setInterval(() => {
                    const diff = end - Date.now();
                    if(diff <= 0) { localStorage.removeItem('rida_end'); location.reload(); }
                    const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
                    document.getElementById('timer').innerText = `${h}:${m}:${s}`;
                    
                    user.balance = parseFloat(user.balance) + (0.2 / 86400);
                    document.getElementById('balance').innerText = user.balance.toFixed(6);
                }, 1000);
            }
        }

        function copyRef() { const c = document.getElementById('refIn'); c.select(); navigator.clipboard.writeText(c.value); alert("Link Copied!"); }
        function logout() { localStorage.clear(); location.reload(); }

        function fetchUsers() {
            // This would normally be a callAPI() function. Mocking for UI test.
            const list = document.getElementById('adminList');
            list.innerHTML = `<div class="glass p-6 rounded-3xl text-center"><p class="text-[10px] font-black text-blue-500">PULLING LIVE NODE DATA FROM GOOGLE SHEETS...</p></div>`;
        }
    </script>
</body>
</html>
