<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIDA PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; transition: all 0.3s; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .active-nav { color: #3b82f6 !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="pb-24">

    <div id="authPage" class="min-h-screen flex flex-col items-center justify-center p-6">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black italic text-blue-500">RIDA NETWORK</h1>
            <p class="text-[10px] uppercase tracking-[0.2em] text-gray-500">Decentralized Node</p>
        </div>
        
        <div class="glass w-full max-w-xs p-8 rounded-[2rem]">
            <div id="signupFields" class="hidden">
                <input type="text" id="regName" class="w-full bg-slate-900 p-3 rounded-xl mb-4 text-sm outline-none" placeholder="Full Name">
            </div>
            <input type="email" id="authEmail" class="w-full bg-slate-900 p-3 rounded-xl mb-4 text-sm outline-none" placeholder="Email">
            <input type="password" id="authPass" class="w-full bg-slate-900 p-3 rounded-xl mb-6 text-sm outline-none" placeholder="Password">
            
            <button onclick="attemptAuth()" id="authBtn" class="w-full bg-blue-600 py-4 rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg shadow-blue-900/20">Access Node</button>
            
            <p class="text-center text-[10px] mt-6 text-gray-500 uppercase font-bold">
                <span id="authMsg">New?</span> 
                <button onclick="toggleAuthMode()" class="text-blue-400">Switch</button>
            </p>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="p-4 flex justify-between items-center border-b border-white/5 sticky top-0 bg-slate-950/50 backdrop-blur-lg z-50">
            <div>
                <h2 id="hName" class="text-[11px] font-black uppercase leading-none">--</h2>
                <p id="hUID" class="text-[9px] text-blue-500 font-bold mt-1">UID: --</p>
            </div>
            <div onclick="showTab('me')" class="flex items-center gap-2 glass py-1 px-3 rounded-full border-blue-500/30 cursor-pointer">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-[9px] font-black uppercase">Verified</span>
            </div>
        </header>

        <main class="p-6">
            <div id="tab-mining" class="space-y-6">
                <div class="bg-gradient-to-br from-blue-600 to-blue-800 p-8 rounded-[2rem] shadow-xl">
                    <p class="text-[10px] uppercase font-bold opacity-60">Balance</p>
                    <h2 class="text-4xl font-black"><span id="balance">0.000000</span> <span class="text-xs font-normal opacity-40">RIDA</span></h2>
                </div>
                
                <div class="glass p-10 rounded-[2.5rem] text-center">
                    <div class="w-32 h-32 border-4 border-blue-500/20 border-t-blue-500 rounded-full mx-auto mb-6 flex items-center justify-center">
                        <span id="timer" class="text-xl font-bold">24:00</span>
                    </div>
                    <button id="mineBtn" onclick="startMining()" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-xs uppercase tracking-widest">Activate Node</button>
                </div>
            </div>

            <div id="tab-me" class="hidden space-y-4">
                <div class="glass p-8 rounded-[2rem] text-center">
                    <div class="w-20 h-20 bg-slate-800 rounded-2xl mx-auto mb-4 border-2 border-blue-500 overflow-hidden">
                        <img id="meAvatar" src="">
                    </div>
                    <h3 id="meName" class="font-bold uppercase text-lg">--</h3>
                    <p id="meEmail" class="text-xs text-gray-500">--</p>
                </div>

                <div class="glass p-6 rounded-2xl space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] font-bold text-gray-500 uppercase">My UID</span>
                        <span id="meUID" class="text-xs font-mono text-blue-400">--</span>
                    </div>
                    <div class="pt-4 border-t border-white/5">
                        <p class="text-[10px] font-bold text-gray-500 uppercase mb-2">Referral Link</p>
                        <div class="flex gap-2">
                            <input readonly id="refUrl" class="bg-slate-900 text-[10px] p-3 rounded-lg flex-1 outline-none" value="rida.net/ref/--">
                            <button onclick="copyRef()" class="bg-blue-600 px-4 rounded-lg"><i data-lucide="copy" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                </div>
                <button onclick="logout()" class="w-full p-4 text-red-500 text-[10px] font-bold uppercase tracking-widest">Sign Out</button>
            </div>
        </main>

        <nav class="fixed bottom-0 inset-x-0 h-20 glass border-t border-white/10 flex justify-around items-center px-8">
            <button onclick="showTab('mining')" id="nav-mining" class="active-nav flex flex-col items-center gap-1">
                <i data-lucide="zap" class="w-6 h-6"></i><span class="text-[8px] font-bold">MINING</span>
            </button>
            <button onclick="showTab('me')" id="nav-me" class="text-gray-500 flex flex-col items-center gap-1">
                <i data-lucide="user" class="w-6 h-6"></i><span class="text-[8px] font-bold">PROFILE</span>
            </button>
        </nav>
    </div>

    <iframe name="secret_frame" class="hidden"></iframe>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby3Pb33YjqnNkkZjTKjgg0ZxULHaLvb2U9O-TzM4nNMim-trzO0Tp2wy1VujHFv2YePWw/exec";
        let isLogin = true;
        let userData = JSON.parse(localStorage.getItem('rida_node'));

        function init() {
            lucide.createIcons();
            if(userData) loadDashboard();
        }

        function toggleAuthMode() {
            isLogin = !isLogin;
            document.getElementById('signupFields').classList.toggle('hidden', isLogin);
            document.getElementById('authBtn').innerText = isLogin ? "Access Node" : "Register Node";
            document.getElementById('authMsg').innerText = isLogin ? "New?" : "Member?";
        }

        // GLOBAL CALLBACK (Called by your Google Script)
        window.handleResponse = function(res) {
            if(res.status === 'success') {
                localStorage.setItem('rida_node', JSON.stringify(res.user));
                location.reload();
            } else {
                alert(res.message);
                document.getElementById('authBtn').disabled = false;
                document.getElementById('authBtn').innerText = "Access Node";
            }
        };

        function attemptAuth() {
            const email = document.getElementById('authEmail').value;
            const pass = document.getElementById('authPass').value;
            const name = document.getElementById('regName').value || 'Miner';
            
            if(!email || !pass) return alert("Fill fields");
            
            document.getElementById('authBtn').innerText = "CONNECTING...";
            document.getElementById('authBtn').disabled = true;

            // Adding a dynamic script tag (Final attempt at universal bypass)
            const script = document.createElement('script');
            script.src = `${SCRIPT_URL}?callback=handleResponse&action=${isLogin?'login':'register'}&email=${email}&password=${pass}&name=${name}&cache=${Date.now()}`;
            document.body.appendChild(script);
        }

        function loadDashboard() {
            document.getElementById('authPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            
            document.getElementById('hName').innerText = userData.name;
            document.getElementById('hUID').innerText = "UID: " + userData.uid;
            document.getElementById('meName').innerText = userData.name;
            document.getElementById('meEmail').innerText = userData.email;
            document.getElementById('meUID').innerText = userData.uid;
            document.getElementById('refUrl').value = `ridanetwork.com/ref/${userData.uid}`;
            document.getElementById('balance').innerText = parseFloat(userData.balance || 0).toFixed(6);
            document.getElementById('meAvatar').src = `https://api.dicebear.com/7.x/bottts/svg?seed=${userData.uid}`;
            
            checkMiningStatus();
        }

        function showTab(tab) {
            document.getElementById('tab-mining').classList.toggle('hidden', tab !== 'mining');
            document.getElementById('tab-me').classList.toggle('hidden', tab !== 'me');
            document.getElementById('nav-mining').classList.toggle('active-nav', tab === 'mining');
            document.getElementById('nav-me').classList.toggle('active-nav', tab === 'me');
        }

        function checkMiningStatus() {
            const start = localStorage.getItem('m_start_' + userData.uid);
            if(start) {
                const diff = (Date.now() - start) / 1000;
                if(diff < 86400) runTimer(start);
            }
        }

        function startMining() {
            localStorage.setItem('m_start_' + userData.uid, Date.now());
            location.reload();
        }

        function runTimer(start) {
            const btn = document.getElementById('mineBtn');
            btn.innerText = "NODE ACTIVE";
            btn.disabled = true;
            btn.classList.replace('bg-blue-600', 'bg-slate-800');

            setInterval(() => {
                const elapsed = (Date.now() - start) / 1000;
                const remaining = 86400 - elapsed;
                
                if(remaining <= 0) {
                    localStorage.removeItem('m_start_' + userData.uid);
                    location.reload();
                }

                const h = Math.floor(remaining / 3600);
                const m = Math.floor((remaining % 3600) / 60);
                document.getElementById('timer').innerText = `${h}h ${m}m`;
                
                // Visual balance update
                const currentBal = parseFloat(userData.balance) + (elapsed * (0.2 / 86400));
                document.getElementById('balance').innerText = currentBal.toFixed(6);
            }, 1000);
        }

        function copyRef() {
            const input = document.getElementById('refUrl');
            input.select();
            navigator.clipboard.writeText(input.value);
            alert("Referral Link Copied!");
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        window.onload = init;
    </script>
</body>
</html>
