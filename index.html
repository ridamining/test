<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RIDA OS | MASTER v23</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --main: #3b82f6; --bg: #010409; --glass: rgba(13, 17, 23, 0.9); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: white; -webkit-tap-highlight-color: transparent; }
        .glass { background: var(--glass); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none !important; }
        .admin-border { border: 2px solid #3b82f6 !important; box-shadow: 0 0 30px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="pb-10">

    <div id="authPage" class="min-h-screen flex items-center justify-center p-6">
        <div class="glass w-full max-w-sm p-10 rounded-[3.5rem] text-center shadow-2xl">
            <h1 class="text-5xl font-black italic text-blue-500 mb-2">RIDA</h1>
            <p class="text-[8px] font-black opacity-30 uppercase tracking-[0.5em] mb-12">Core Engine v23.0</p>
            
            <div class="space-y-4" id="authForm">
                <input type="email" id="email" class="w-full bg-white/5 p-5 rounded-3xl border border-white/5 outline-none text-sm" placeholder="Email Address">
                <input type="password" id="pass" class="w-full bg-white/5 p-5 rounded-3xl border border-white/5 outline-none text-sm" placeholder="Access Key">
                <button onclick="handleLogin()" class="w-full bg-blue-600 py-5 rounded-[2rem] font-black uppercase text-[10px] tracking-widest shadow-xl hover:bg-blue-500 transition-all">Initialize Node</button>
            </div>
        </div>
    </div>

    <div id="adminPanel" class="hidden p-6 space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-700">
        <header class="flex justify-between items-center bg-blue-600/10 p-6 rounded-[2.5rem] admin-border">
            <div>
                <h2 class="text-xl font-black text-blue-500 italic">COMMAND CENTER</h2>
                <p class="text-[8px] font-bold opacity-50 uppercase tracking-widest">Master Authority v23</p>
            </div>
            <button onclick="logout()" class="p-3 bg-red-500/20 rounded-2xl text-red-500"><i data-lucide="power"></i></button>
        </header>

        <div class="grid grid-cols-2 gap-4">
            <div class="glass p-6 rounded-3xl text-center border border-white/5">
                <p class="text-[8px] font-black opacity-40 uppercase">Total Active Nodes</p>
                <h3 class="text-2xl font-black">1,042</h3>
            </div>
            <div class="glass p-6 rounded-3xl text-center border border-white/5">
                <p class="text-[8px] font-black opacity-40 uppercase">Pending KYC</p>
                <h3 class="text-2xl font-black text-orange-500">12</h3>
            </div>
        </div>

        <div class="glass rounded-[2.5rem] overflow-hidden border border-white/5">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/5">
                <h3 class="text-xs font-black uppercase tracking-widest">Global Registry</h3>
                <span class="text-[7px] font-black bg-blue-600 px-2 py-1 rounded">LIVE SYNC</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-[10px]">
                    <thead class="bg-black/20 text-slate-500 font-black uppercase">
                        <tr>
                            <th class="p-4">UID</th>
                            <th class="p-4">Wallet</th>
                            <th class="p-4">Status</th>
                            <th class="p-4">Control</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody" class="divide-y divide-white/5">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="userApp" class="hidden animate-in fade-in duration-500">
        <header class="p-6 flex justify-between items-center glass rounded-b-[2.5rem]">
            <h2 class="text-xl font-black italic">RIDA <span class="text-blue-500">MINER</span></h2>
            <div id="userStatus" class="text-[8px] font-black uppercase px-3 py-1.5 rounded-xl border border-white/5">---</div>
        </header>

        <main class="p-6 space-y-6">
            <div class="glass p-10 rounded-[4rem] text-center border-t border-white/10">
                <p class="text-[10px] font-black opacity-30 mb-2 uppercase">Your Assets</p>
                <h2 class="text-5xl font-black mb-8"><span id="userBal">0.000000</span></h2>
                <button onclick="alert('Node Syncing...')" class="w-full py-5 rounded-[2rem] bg-blue-600 font-black uppercase text-xs tracking-widest shadow-xl">Activate Mining</button>
            </div>
            
            <div class="glass p-8 rounded-[3rem] border border-white/5">
                <h3 class="text-xs font-black uppercase mb-4 text-blue-500">KYC Verification</h3>
                <p class="text-[9px] opacity-40 mb-6">Status: Unverified. Link wallet to start.</p>
                <button onclick="logout()" class="w-full bg-red-500/10 py-4 rounded-2xl text-red-500 text-[8px] font-black uppercase tracking-widest">Logout Session</button>
            </div>
        </main>
    </div>

    <script>
        function handleLogin() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;

            if(!email || !pass) return alert("Fill all fields");

            // CRITICAL: Clear previous session to prevent role-lock
            localStorage.removeItem('rida_session');

            let sessionData;
            if (email === "adminrida@gmail.com" && pass === "CocoMomoPakistan@786") {
                sessionData = { role: 'admin', email: email, name: 'Master Admin' };
            } else {
                sessionData = { role: 'user', email: email, uid: 'RIDA-'+Math.floor(1000+Math.random()*9000), status: 'Unverified', balance: 0.0 };
            }

            localStorage.setItem('rida_session', JSON.stringify(sessionData));
            location.reload(); // Refresh to trigger view logic
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        window.onload = () => {
            const session = JSON.parse(localStorage.getItem('rida_session'));
            
            if (!session) {
                document.getElementById('authPage').classList.remove('hidden');
            } else {
                document.getElementById('authPage').classList.add('hidden');
                
                if (session.role === 'admin') {
                    document.getElementById('adminPanel').classList.remove('hidden');
                    renderAdminData();
                } else {
                    document.getElementById('userApp').classList.remove('hidden');
                    document.getElementById('userStatus').innerText = session.status;
                    document.getElementById('userBal').innerText = session.balance.toFixed(6);
                }
            }
            lucide.createIcons();
        };

        function renderAdminData() {
            const mockUsers = [
                { uid: 'RIDA-5021', wallet: '0x7BE...B917', status: 'Tentative' },
                { uid: 'RIDA-1109', wallet: 'None', status: 'Unverified' },
                { uid: 'RIDA-4432', wallet: '0xABC...221', status: 'Verified' }
            ];

            const tbody = document.getElementById('adminTableBody');
            tbody.innerHTML = mockUsers.map(u => `
                <tr class="hover:bg-white/5 transition-all">
                    <td class="p-4 font-black">${u.uid}</td>
                    <td class="p-4 font-mono opacity-50">${u.wallet}</td>
                    <td class="p-4">
                        <span class="px-2 py-1 rounded-lg ${u.status==='Verified'?'bg-green-500/10 text-green-500':'bg-orange-500/10 text-orange-500'} font-black">
                            ${u.status}
                        </span>
                    </td>
                    <td class="p-4">
                        <button onclick="updateStatus('${u.uid}', 'Verified')" class="bg-blue-600/20 text-blue-500 px-3 py-1 rounded-lg border border-blue-500/30 hover:bg-blue-600 hover:text-white transition-all">Approve</button>
                    </td>
                </tr>
            `).join('');
        }

        function updateStatus(uid, newStatus) {
            alert(`Broadcasting to Google Sheets: UID ${uid} is now ${newStatus}`);
            // Logic to send to API will go here
        }
    </script>
</body>
</html>
