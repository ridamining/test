<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIDA NETWORK - Debug Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white p-6">

    <div class="max-w-2xl mx-auto">
        <h1 class="text-4xl font-bold mb-8 text-center">RIDA NETWORK - Debug</h1>

        <!-- Auth Section -->
        <div class="glass bg-zinc-900 border border-zinc-700 rounded-3xl p-8 mb-8">
            <h2 class="text-2xl mb-4">1. Login / Register</h2>
            <input id="email" placeholder="Email" class="w-full p-4 bg-zinc-800 rounded-2xl mb-3">
            <input id="password" type="password" placeholder="Password" class="w-full p-4 bg-zinc-800 rounded-2xl mb-4">
            <button onclick="handleAuth()" class="w-full py-4 bg-blue-600 rounded-2xl font-bold">Login / Register</button>
        </div>

        <!-- Mining Section (only visible after login) -->
        <div id="mining-section" class="hidden glass bg-zinc-900 border border-zinc-700 rounded-3xl p-8">
            <h2 class="text-2xl mb-6">2. Mining Test</h2>
            <button onclick="startMiningTest()" class="w-full py-5 bg-emerald-600 hover:bg-emerald-700 rounded-2xl font-bold text-lg mb-4">
                START MINING
            </button>
            <button onclick="claimRewardTest()" class="w-full py-5 bg-amber-600 hover:bg-amber-700 rounded-2xl font-bold text-lg">
                CLAIM REWARD
            </button>

            <div id="result" class="mt-6 p-4 bg-black rounded-2xl text-sm font-mono whitespace-pre-wrap"></div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzMvRrdKuXbAuL7Gg84nZOmIeOs1OJs9Aec2tHTSH5jSgtgwS9k-_3ZDPklOQCLdw0lkQ/exec";

        let currentUser = null;
        let sessionToken = null;

        async function apiCall(action, extra = {}) {
            const payload = {
                action: action,
                email: currentUser ? currentUser.email : extra.email,
                token: sessionToken,
                ...extra
            };

            const resultDiv = document.getElementById('result');
            resultDiv.textContent = `Sending ${action}...\n`;

            try {
                const res = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });

                const text = await res.text();
                resultDiv.textContent += `Raw Response:\n${text}\n\n`;

                let json = {};
                try { json = JSON.parse(text); } catch(e) {}

                if (json.success) {
                    resultDiv.textContent += `✅ Success!\n${JSON.stringify(json.data || json, null, 2)}`;
                } else {
                    resultDiv.textContent += `❌ Failed: ${json.error || 'Unknown error'}`;
                }
            } catch (err) {
                resultDiv.textContent += `❌ Fetch Error: ${err.message}`;
            }
        }

        async function handleAuth() {
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert("Enter email and password");
                return;
            }

            await apiCall('LOGIN', { email, password });

            // If login fails, try register
            if (document.getElementById('result').textContent.includes('User not found')) {
                await apiCall('REGISTER', { email, password });
            }

            // If successful, show mining section
            if (document.getElementById('result').textContent.includes('Success')) {
                currentUser = { email };
                sessionToken = "debug-token";   // temporary
                document.getElementById('mining-section').classList.remove('hidden');
            }
        }

        async function startMiningTest() {
            await apiCall('START_MINING');
        }

        async function claimRewardTest() {
            await apiCall('CLAIM_REWARD');
        }
    </script>
</body>
</html>
