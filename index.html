<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RIDA OS | GLOBAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.08); }
        .active-tab { color: #3b82f6 !important; transform: scale(1.1); }
        .mining-glow { box-shadow: 0 0 40px rgba(59, 130, 246, 0.2); }
        .btn-disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinning { animation: spin-slow 3s linear infinite; }
    </style>
</head>
<body class="pb-32">

    <header class="p-6 flex justify-between items-center sticky top-0 z-[100] glass rounded-b-[2.5rem]">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-900/40">
                <i data-lucide="layers" class="w-4 h-4 text-white"></i>
            </div>
            <h1 class="text-lg font-black italic tracking-tighter text-white">RIDA <span class="text-blue-500">PRO</span></h1>
        </div>
        <div class="text-right">
            <div id="statusBadge" class="text-[8px] font-black uppercase px-2 py-1 rounded bg-red-500/10 text-red-500 border border-red-500/20">Unverified</div>
            <p id="kstClock" class="text-[7px] font-bold text-slate-500 mt-1 uppercase">KST: --:--</p>
        </div>
    </header>

    <main class="p-6">
        <div id="tab-mining" class="space-y-6 animate-in fade-in duration-500">
            <div class="glass p-10 rounded-[3rem] text-center border-t border-blue-500/30 mining-glow">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] mb-2">Available Yield</p>
                <h2 class="text-5xl font-black tracking-tighter mb-8"><span id="mainBalance">0.000000</span> <span class="text-xs text-blue-500 italic">RIDA</span></h2>
                
                <div class="relative w-48 h-48 mx-auto mb-8 flex items-center justify-center">
                    <div id="ring" class="absolute inset-0 border-[6px] border-slate-900 border-t-blue-500 rounded-full transition-all"></div>
                    <div class="text-center">
                        <span id="countdown" class="text-3xl font-black block">24:00:00</span>
                        <span class="text-[8px] font-bold text-slate-500 uppercase">Session</span>
                    </div>
                </div>
                
                <button id="mineAction" onclick="launchNode()" class="w-full bg-blue-600 py-6 rounded-[2rem] font-black uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-all">Launch Node</button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div onclick="openTransfer()" class="glass p-6 rounded-[2rem] flex flex-col items-center gap-3 active:scale-95 transition-all cursor-pointer">
                    <i data-lucide="send-horizontal" class="text-blue-500"></i>
                    <span class="text-[9px] font-black uppercase tracking-widest">P2P Transfer</span>
                </div>
                <div onclick="showTab('profile')" class="glass p-6 rounded-[2rem] flex flex-col items-center gap-3 active:scale-95 transition-all cursor-pointer">
                    <i data-lucide="users" class="text-emerald-500"></i>
                    <span class="text-[9px] font-black uppercase tracking-widest">Bounty: 0.50</span>
                </div>
            </div>
        </div>

        <div id="tab-profile" class="hidden space-y-4 animate-in slide-in-from-right duration-500">
            <div class="glass p-10 rounded-[3rem] text-center">
                <div class="w-20 h-20 mx-auto bg-slate-900 rounded-[2rem] mb-4 border-2 border-blue-500 p-1">
                    <img id="uAvatar" src="" class="w-full h-full rounded-[1.6rem]">
                </div>
                <h3 id="uName" class="font-black text-lg uppercase">--</h3>
                <p id="uEmail" class="text-[10px] text-slate-500 mb-6">--</p>
                
                <div class="grid grid-cols-2 gap-2 text-left">
                    <div class="bg-slate-900/50 p-4 rounded-2xl border border-white/5">
                        <p class="text-[7px] font-black text-blue-500 uppercase mb-1">Node ID</p>
                        <p id="uUID" class="text-[10px] font-black italic">--</p>
                    </div>
                    <div class="bg-slate-900/50 p-4 rounded-2xl border border-white/5">
                        <p class="text-[7px] font-black text-blue-500 uppercase mb-1">Referrals</p>
                        <p id="uRefs" class="text-[10px] font-black">0 Nodes</p>
                    </div>
                </div>
            </div>
            
            <div class="glass p-6 rounded-[2rem]">
                <p class="text-[9px] font-black text-slate-500 uppercase mb-4 tracking-widest">Invitation Link (Earn 0.5 Rida)</p>
                <div class="flex gap-2">
                    <input id="refLink" readonly class="flex-1 bg-slate-950 p-4 rounded-xl text-[9px] font-bold text-blue-400 border border-white/5">
                    <button onclick="copyRef()" class="bg-blue-600 px-5 rounded-xl"><i data-lucide="copy" class="w-4 h-4"></i></button>
                </div>
                <p class="text-[7px] font-bold text-slate-600 mt-3 uppercase italic text-center">* Referral must verify KYC within 7 days for 0.5 bonus</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-8 left-8 right-8 h-20 glass rounded-[2.5rem] flex items-center justify-around z-[100] border-t border-white/10 shadow-2xl">
        <button onclick="showTab('social')" id="nav-social" class="text-slate-500 transition-all"><i data-lucide="globe"></i></button>
        <button onclick="showTab('mining')" id="nav-mining" class="w-16 h-16 bg-blue-600 rounded-full -translate-y-8 flex items-center justify-center border-4 border-[#020617] text-white shadow-xl"><i data-lucide="cpu"></i></button>
        <button onclick="showTab('profile')" id="nav-profile" class="text-slate-500 transition-all"><i data-lucide="user"></i></button>
    </nav>

    <script>
        let user = JSON.parse(localStorage.getItem('rida_v11_final'));
        
        // --- KOREAN TIME SYNC ---
        function updateKST() {
            const now = new Date();
            const kst = new Date(now.toLocaleString("en-US", {timeZone: "Asia/Seoul"}));
            const h = kst.getHours().toString().padStart(2,'0');
            const m = kst.getMinutes().toString().padStart(2,'0');
            document.getElementById('kstClock').innerText = `KST: ${h}:${m}`;
            
            // Daily yield reset check at 05:55 AM
            if(h === "05" && m === "55") {
                console.log("Daily Protocol Syncing...");
                // Add 0.01 dividend logic here
            }
        }
        setInterval(updateKST, 1000);

        function showTab(t) {
            ['mining', 'social', 'profile'].forEach(id => {
                const el = document.getElementById('tab-'+id);
                if(el) el.classList.toggle('hidden', id !== t);
                document.getElementById('nav-'+id)?.classList.toggle('active-tab', id === t);
            });
            if(t === 'profile') loadProfile();
        }

        function openTransfer() {
            if(user.status !== "Verified") {
                alert("❌ ACCESS DENIED: Your node must be 'Verified' to use P2P Transfers. Contact Admin via Support.");
            } else {
                alert("✅ Transfer Protocol Initiated. (Admin: 0.2-10k | User: 10-100)");
                // Redirect to actual transfer input page
            }
        }

        function loadProfile() {
            document.getElementById('uName').innerText = user.name;
            document.getElementById('uEmail').innerText = user.email;
            document.getElementById('uUID').innerText = user.uid;
            document.getElementById('uRefs').innerText = (user.refCount || 0) + " Nodes";
            document.getElementById('uAvatar').src = `https://api.dicebear.com/7.x/bottts/svg?seed=${user.uid}`;
            document.getElementById('refLink').value = `${window.location.origin}${window.location.pathname}?ref=${user.uid}`;
        }

        function launchNode() {
            localStorage.setItem('rida_start', Date.now());
            location.reload();
        }

        function checkTimer() {
            const start = localStorage.getItem('rida_start');
            if(start) {
                const btn = document.getElementById('mineAction');
                btn.innerText = "NODE SYNCHRONIZED"; btn.disabled = true; btn.classList.add('btn-disabled');
                document.getElementById('ring').classList.add('spinning');
                
                setInterval(() => {
                    const elap = (Date.now() - start) / 1000;
                    const rem = 86400 - elap;
                    if(rem <= 0) { localStorage.removeItem('rida_start'); location.reload(); }
                    
                    const h = Math.floor(rem/3600), m = Math.floor((rem%3600)/60), s = Math.floor(rem%60);
                    document.getElementById('countdown').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                    
                    user.balance = parseFloat(user.balance) + (0.2 / 86400);
                    document.getElementById('mainBalance').innerText = user.balance.toFixed(6);
                }, 1000);
            }
        }

        // --- AUTH SIMULATION ---
        if(!user) {
            // Force a simple registration for testing
            user = { uid: "RIDA-902110", name: "Alpha Miner", email: "user@rida.io", balance: 0.00, status: "Unverified", refCount: 0 };
            localStorage.setItem('rida_v11_final', JSON.stringify(user));
        }

        window.onload = () => {
            lucide.createIcons();
            document.getElementById('statusBadge').innerText = user.status;
            document.getElementById('hUID').innerText = user.uid;
            showTab('mining');
            checkTimer();
        };

        function copyRef() { const i = document.getElementById('refLink'); i.select(); navigator.clipboard.writeText(i.value); alert("Link Copied!"); }
    </script>
</body>
</html>
