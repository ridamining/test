<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rida Network</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 text-white">

<div class="max-w-md mx-auto p-4">

<!-- TITLE -->
<h1 class="text-3xl font-bold text-center mb-6 text-yellow-400">
🚀 Rida Network
</h1>

<!-- AUTH SECTION -->
<div id="authBox">

<input id="email" placeholder="Email"
class="w-full p-3 mb-2 rounded text-black">

<input id="password" type="password" placeholder="Password"
class="w-full p-3 mb-4 rounded text-black">

<button onclick="register()" 
class="bg-blue-600 w-full p-3 rounded mb-2">
Register
</button>

<button onclick="login()" 
class="bg-green-600 w-full p-3 rounded">
Login
</button>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<div class="bg-gray-800 p-4 rounded mb-4">
<p class="text-lg">Balance</p>
<p class="text-3xl text-green-400" id="balance">0</p>
</div>

<button onclick="claim()" 
class="bg-yellow-500 w-full p-3 rounded mb-3">
⛏ Start Mining
</button>

<button onclick="logout()" 
class="bg-red-500 w-full p-2 rounded">
Logout
</button>

<p id="status" class="text-center mt-3 text-sm text-gray-400"></p>

</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxI3vMoMaGF0Ia4s_zxZX7k6vP5r4FKDKtbq0Zxq6gPuqanwcizwo-OvVg6SYFI-3nw/exec";

let user = null;

/***********************
 SAFE FETCH (CORS FIX)
***********************/
async function api(data) {
  try {
    const res = await fetch(API, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify(data)
    });

    const text = await res.text();

    try {
      return JSON.parse(text);
    } catch {
      return { error: "Invalid response", raw: text };
    }

  } catch (err) {
    return { error: "Network error" };
  }
}

/***********************
 AUTH
***********************/
async function register() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await api({
    action: "register",
    email,
    password
  });

  alert(JSON.stringify(res));
}

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await api({
    action: "login",
    email,
    password
  });

  if (res.success) {
    user = res.user;

    localStorage.setItem("user", JSON.stringify(user));

    showDashboard();
  } else {
    alert(res.error);
  }
}

/***********************
 DASHBOARD
***********************/
function showDashboard() {
  document.getElementById("authBox").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");

  document.getElementById("balance").innerText = user.balance;
}

/***********************
 CLAIM
***********************/
async function claim() {

  document.getElementById("status").innerText = "Mining...";

  const res = await api({
    action: "claim",
    userId: user.userId
  });

  if (res.success) {
    user.balance = res.balance;
    localStorage.setItem("user", JSON.stringify(user));

    document.getElementById("balance").innerText = res.balance;
    document.getElementById("status").innerText = "✅ Reward Added!";
  } else {
    document.getElementById("status").innerText = res.error;
  }
}

/***********************
 LOGOUT
***********************/
function logout() {
  localStorage.removeItem("user");
  location.reload();
}

/***********************
 AUTO LOGIN
***********************/
window.onload = () => {
  const saved = localStorage.getItem("user");
  if (saved) {
    user = JSON.parse(saved);
    showDashboard();
  }
};

</script>

</body>
</html>
