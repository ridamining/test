<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rida Network</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:#fff;
  text-align:center;
}

.container{
  max-width:420px;
  margin:auto;
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border-radius:16px;
  padding:20px;
  margin-top:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.6);
}

input{
  width:90%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:#fff;
  font-weight:bold;
  margin-top:15px;
  cursor:pointer;
}

button:disabled{
  background:#555;
}

.mining{
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

.small{
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Rida Network</h1>

<!-- LOGIN -->
<div id="loginBox" class="card">
<input id="email" placeholder="Enter Email">
<br>
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">

<div class="card">
<h2 id="balance">0</h2>
<p>RIDA Balance</p>
<p id="status"></p>
</div>

<div class="card">
<button id="mineBtn" onclick="checkIn()">⛏️ Start Mining</button>
<p id="timer" class="small"></p>
</div>

<div class="card">
<input id="tx" placeholder="Enter TxID">
<button onclick="submitTx()">Submit Verification</button>
</div>

<div class="card">
<p>Your Referral Link:</p>
<p id="refLink" class="small"></p>
</div>

</div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzy-KlWcadejKr9qYlPOSiiE3I1LLlkvNf_0-xvWw3aOjykDiLTiYXDF1knGamSHULJKQ/exec";

let user = null;

// ✅ FIXED POST (NO CORS ISSUE)
async function post(data){
  const res = await fetch(API,{
    method:"POST",
    redirect:"follow",
    headers:{
      "Content-Type":"text/plain;charset=utf-8"
    },
    body: JSON.stringify(data)
  });

  const text = await res.text();

  try{
    return JSON.parse(text);
  }catch(e){
    console.error(text);
    alert("Server error");
    return {status:"error"};
  }
}

// 🔹 LOGIN
async function login(){
  let email = document.getElementById("email").value.trim();
  if(!email) return alert("Enter email");

  await post({
    action:"registerUser",
    email,
    name:"User",
    pic:"",
    ref: localStorage.getItem("ref") || ""
  });

  let res = await post({
    action:"getUser",
    email
  });

  if(res.status !== "success"){
    alert("Login failed");
    return;
  }

  user = res.user;

  document.getElementById("loginBox").style.display="none";
  document.getElementById("dashboard").style.display="block";

  updateUI();
}

// 🔹 UPDATE UI
function updateUI(){
  document.getElementById("balance").innerText = user[4];

  const status = user[7];
  const mineBtn = document.getElementById("mineBtn");

  if(status === "true"){
    document.getElementById("status").innerText = "✅ Verified";
    mineBtn.disabled = false;
  }
  else if(status === "pending"){
    document.getElementById("status").innerText = "⏳ Pending Verification";
    mineBtn.disabled = true;
  }
  else{
    document.getElementById("status").innerText = "❌ Not Verified";
    mineBtn.disabled = true;
  }

  // referral
  document.getElementById("refLink").innerText =
    location.origin + location.pathname + "?ref=" + user[6];

  startTimer();
}

// 🔹 MINING
async function checkIn(){
  const btn = document.getElementById("mineBtn");
  btn.classList.add("mining");

  let res = await post({
    action:"checkIn",
    userId:user[0]
  });

  btn.classList.remove("mining");

  if(res.status === "success"){
    user[4] = res.balance;
    user[9] = new Date();
    alert("✅ Mining successful!");
  }
  else if(res.status === "wait"){
    alert("⏳ Wait 24 hours");
  }
  else if(res.status === "not_verified"){
    alert("❌ Verify first");
  }
  else{
    alert("Mining stopped");
  }

  updateUI();
}

// 🔹 TIMER (24H COUNTDOWN)
function startTimer(){
  const el = document.getElementById("timer");

  if(!user[9]){
    el.innerText = "Ready to mine";
    return;
  }

  setInterval(()=>{
    const last = new Date(user[9]);
    const now = new Date();
    const diff = 86400000 - (now - last);

    if(diff <= 0){
      el.innerText = "Ready to mine";
      return;
    }

    const h = Math.floor(diff/3600000);
    const m = Math.floor((diff%3600000)/60000);
    const s = Math.floor((diff%60000)/1000);

    el.innerText = `Next in ${h}h ${m}m ${s}s`;
  },1000);
}

// 🔹 SUBMIT TX
async function submitTx(){
  const tx = document.getElementById("tx").value.trim();
  if(!tx) return alert("Enter TxID");

  await post({
    action:"submitTx",
    userId:user[0],
    email:user[1],
    tx
  });

  alert("Submitted for verification");
}

// 🔹 REF TRACK
(function(){
  const params = new URLSearchParams(window.location.search);
  const ref = params.get("ref");
  if(ref){
    localStorage.setItem("ref", ref);
  }
})();
</script>

</body>
</html>
