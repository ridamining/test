<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIDA NETWORK</title>

<style>

body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0a0f1f,#05070f);
  color:#fff;
  overflow-x:hidden;
}

/* HEADER */
.header{
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
}

/* GLASS CARD */
.card{
  margin:15px;
  padding:18px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 0 30px rgba(0,255,255,0.08);
}

/* BALANCE */
.balance{
  text-align:center;
}
.balance h2{
  margin:5px 0;
  font-size:32px;
  color:#00f2ff;
}

/* MINING CORE */
.mining-box{
  text-align:center;
}

.mine-btn{
  width:180px;
  height:180px;
  border-radius:50%;
  border:none;
  font-size:18px;
  color:#fff;
  background:radial-gradient(circle,#00f2ff,#0066ff);
  margin:20px auto;
  display:block;
  box-shadow:0 0 40px #00f2ff;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 20px #00f2ff;}
  50%{box-shadow:0 0 70px #00f2ff;}
  100%{box-shadow:0 0 20px #00f2ff;}
}

.counter{
  font-size:18px;
  margin-top:10px;
}

/* NAVBAR */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:rgba(0,0,0,0.8);
  backdrop-filter:blur(10px);
}

.nav div{
  flex:1;
  text-align:center;
  padding:12px;
  font-size:18px;
  color:#888;
}

.nav .active{
  color:#00f2ff;
}

/* PAGES */
.page{display:none;}
.activePage{display:block;}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
}

button{
  padding:12px;
  border:none;
  border-radius:12px;
  background:#00c6ff;
  color:#fff;
  width:100%;
  margin-top:5px;
}

</style>
</head>

<body>

<div class="header">⚡ RIDA NETWORK</div>

<!-- HOME -->
<div id="home" class="page activePage">

  <div class="card">
    📢 <span id="broadcast"></span>
  </div>

  <div class="card balance">
    <div>Balance</div>
    <h2 id="balance">0</h2>
  </div>

  <div class="card mining-box">
    <button id="mineBtn" class="mine-btn" onclick="startMining()">START</button>
    <div class="counter" id="counter">Ready</div>
    <button onclick="claim()">Claim Reward</button>
  </div>

</div>

<!-- WALLET -->
<div id="wallet" class="page">
  <div class="card">
    <input id="amount" placeholder="Amount">
    <input id="walletAddr" placeholder="Wallet Address">
    <button onclick="withdraw()">Withdraw</button>
  </div>
</div>

<!-- PROFILE -->
<div id="profile" class="page">
  <div class="card">
    <p>Email: <span id="pEmail"></span></p>
    <p>ID: <span id="pId"></span></p>
    <p>KYC: <span id="pKyc"></span></p>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
  <div class="card">
    <button onclick="loadUsers()">Load Users</button>
    <div id="users"></div>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="nav(this,'home')" class="active">🏠</div>
  <div onclick="nav(this,'wallet')">💰</div>
  <div onclick="nav(this,'profile')">👤</div>
  <div onclick="nav(this,'admin')">👑</div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzFwjQRnPDSlvqyHwYSiqFkqEZB73YAEK7R5ToKpO9VRkx_x5ZkpCC0kM2GHilQ0tYS/exec";

let token=localStorage.getItem("token");
let mining=false;

// NAV
function nav(el,page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("activePage"));
  document.getElementById(page).classList.add("activePage");

  document.querySelectorAll(".nav div").forEach(n=>n.classList.remove("active"));
  el.classList.add("active");
}

// LOAD
async function load(){
  let r=await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"getStatus",token})
  });

  let d=await r.json();

  balance.innerText=d.balance;
  broadcast.innerText=d.broadcast;

  pEmail.innerText=d.email;
  pId.innerText=d.userId;
  pKyc.innerText=d.kycStatus;

  if(Date.now()-d.lastMining<86400000){
    mining=true;
    mineBtn.innerText="MINING";
    timer(d.lastMining);
  }

  if(d.role!=="admin"){
    document.querySelector(".nav div:last-child").style.display="none";
  }
}

// TIMER
function timer(last){
  setInterval(()=>{
    let t=86400000-(Date.now()-last);

    if(t<=0){
      counter.innerText="Ready to claim";
      mining=false;
      mineBtn.innerText="START";
      return;
    }

    let h=Math.floor(t/3600000);
    let m=Math.floor((t%3600000)/60000);
    let s=Math.floor((t%60000)/1000);

    counter.innerText=`${h}h ${m}m ${s}s`;
  },1000);
}

// MINING
async function startMining(){
  if(mining){alert("Already active");return;}

  let r=await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"startMining",token})
  });

  let d=await r.json();

  if(d.success){
    mining=true;
    mineBtn.innerText="MINING";
    timer(Date.now());
  }
}

// CLAIM
async function claim(){
  if(mining){alert("Wait");return;}

  let r=await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"claimMining",token})
  });

  let d=await r.json();
  if(d.success){
    balance.innerText=d.balance;
  }
}

// WITHDRAW
async function withdraw(){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"withdraw",
      token,
      amount:parseFloat(amount.value),
      wallet:walletAddr.value
    })
  });
  alert("Requested");
}

// ADMIN
async function loadUsers(){
  let r=await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"getUsers",token})
  });

  let d=await r.json();

  users.innerHTML="";
  d.users.slice(1).forEach(u=>{
    users.innerHTML+=`
      <div class="card">
        ${u[1]} | ${u[4]} | ${u[7]}
        <button onclick="verify('${u[0]}')">Verify</button>
      </div>
    `;
  });
}

async function verify(id){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"updateKYC",
      token,
      userId:id,
      status:"verified"
    })
  });
  loadUsers();
}

// INIT
if(token){load();}

</script>

</body>
</html>
