<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rida Network - Mine Rida Daily</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div id="app" class="min-h-screen"></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyMYNHXZ7g40fD6GVpSFMWCHFh6leDEqij-HeZ8i5RWUR5JFvXlTZc3XJ2DEa_LjAEF/exec";
    let currentToken = localStorage.getItem('ridaToken') || null;

    function showToast(msg, type = 'success') {
      const t = document.createElement('div');
      t.style.cssText = `position:fixed;bottom:30px;right:30px;padding:16px 24px;border-radius:16px;color:white;z-index:9999;${type==='success'?'background:#10b981':'background:#ef4444'}`;
      t.innerHTML = `<i class="fa-solid \( {type==='success'?'fa-check-circle':'fa-exclamation-circle'} mr-2"></i> \){msg}`;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 4000);
    }

    async function apiCall(action, body = {}) {
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({action, token: currentToken, ...body})
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || 'Failed');
        return data;
      } catch (err) {
        console.error(err);
        showToast(err.message || 'Cannot connect to server', 'error');
        throw err;
      }
    }

    function render(view) {
      const app = document.getElementById('app');
      app.innerHTML = '';

      if (view === 'landing' || !currentToken) {
        app.innerHTML = `
          <div class="min-h-screen bg-gradient-to-br from-zinc-950 to-black flex items-center justify-center px-6">
            <div class="text-center max-w-md">
              <div class="text-8xl mb-8">⛏️</div>
              <h1 class="text-6xl font-bold mb-6">Rida Network</h1>
              <p class="text-2xl text-zinc-400 mb-12">Daily 5 Rida mining with referrals</p>
              <div class="flex gap-4 justify-center">
                <button onclick="navigate('login')" class="px-10 py-4 border border-white/40 hover:bg-white/10 rounded-2xl">Login</button>
                <button onclick="navigate('register')" class="px-12 py-4 bg-emerald-500 hover:bg-emerald-600 rounded-2xl font-semibold">Join Free</button>
              </div>
            </div>
          </div>`;
      } else if (view === 'register' || view === 'login') {
        const isRegister = view === 'register';
        app.innerHTML = `
          <div class="min-h-screen flex items-center justify-center">
            <div class="bg-zinc-900 p-10 rounded-3xl w-full max-w-md">
              <h2 class="text-3xl font-bold text-center mb-8">${isRegister ? 'Create Account' : 'Login'}</h2>
              <input id="email" type="email" placeholder="Email" class="w-full bg-zinc-800 border border-white/10 rounded-2xl px-6 py-4 mb-4">
              <input id="password" type="password" placeholder="Password" class="w-full bg-zinc-800 border border-white/10 rounded-2xl px-6 py-4 mb-8">
              <button onclick="\( {isRegister ? 'handleRegister()' : 'handleLogin()'}" class="w-full py-4 bg-emerald-500 rounded-2xl font-semibold"> \){isRegister ? 'Register' : 'Login'}</button>
            </div>
          </div>`;
      } else {
        app.innerHTML = `<div class="min-h-screen flex items-center justify-center text-center"><div><p class="text-3xl">Welcome to Dashboard</p><p class="text-emerald-400 mt-4">Claim button coming soon...</p></div></div>`;
      }
    }

    function navigate(page) {
      render(page);
    }

    async function handleRegister() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!email || !password) return showToast('Please fill all fields', 'error');
      try {
        await apiCall('register', {email, password});
        showToast('Account created! Please login.', 'success');
        navigate('login');
      } catch(e){}
    }

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!email || !password) return showToast('Please fill all fields', 'error');
      try {
        const data = await apiCall('login', {email, password});
        currentToken = data.token;
        localStorage.setItem('ridaToken', currentToken);
        showToast('Login successful!', 'success');
        render('dashboard');
      } catch(e){}
    }

    // Start the app safely
    window.onload = () => {
      setTimeout(() => render(currentToken ? 'dashboard' : 'landing'), 300);
    };
  </script>
</body>
</html>
