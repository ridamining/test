<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rida Network - Mine Rida Daily</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div id="app" class="min-h-screen">
    <!-- Static fallback if JS fails -->
    <div class="flex items-center justify-center min-h-screen">
      <div class="text-center">
        <div class="text-6xl mb-6">⛏️</div>
        <h1 class="text-4xl font-bold mb-4">Rida Network</h1>
        <p class="text-zinc-400">Loading...</p>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwIjEOJzg2X20aEhYLvDKv0jOf_0QnPajJ5Jb4DrZhDl7GYF4uKkaSVSLOPwNiu8Df9/exec";
    let currentToken = localStorage.getItem('ridaToken') || null;

    function showToast(msg, type = 'success') {
      const t = document.createElement('div');
      t.style.cssText = `position:fixed;bottom:20px;right:20px;padding:12px 20px;border-radius:12px;color:white;z-index:9999;${type==='success'?'background:#10b981':'background:#ef4444'}`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 4000);
    }

    async function apiCall(action, body = {}) {
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({action, token: currentToken, ...body})
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || 'Failed');
        return data;
      } catch (e) {
        console.error(e);
        showToast(e.message, 'error');
        throw e;
      }
    }

    function render(view = 'landing') {
      const app = document.getElementById('app');
      app.innerHTML = '';

      if (view === 'landing') {
        app.innerHTML = `
          <div class="min-h-screen bg-gradient-to-br from-zinc-950 to-black flex items-center justify-center">
            <div class="text-center px-6">
              <div class="text-7xl mb-8">⛏️</div>
              <h1 class="text-6xl font-bold mb-6">Rida Network</h1>
              <p class="text-xl text-zinc-400 mb-10">Daily Mining • Real Rewards</p>
              <div class="flex gap-4 justify-center flex-wrap">
                <button onclick="navigate('login')" class="px-8 py-4 border border-white/40 rounded-2xl hover:bg-white/10">Login</button>
                <button onclick="navigate('register')" class="px-10 py-4 bg-emerald-500 hover:bg-emerald-600 rounded-2xl font-semibold">Join Free</button>
              </div>
            </div>
          </div>`;
      }
      // Add more views later once basic loading works
    }

    function navigate(page) {
      render(page);
    }

    // Safe initialization
    window.onload = function() {
      try {
        // Try to init Tailwind
        if (typeof tailwind !== 'undefined') {
          tailwind.config = { darkMode: 'class' };
        }
        render(currentToken ? 'dashboard' : 'landing');
      } catch (err) {
        console.error("App failed to start:", err);
        document.getElementById('app').innerHTML = `
          <div class="min-h-screen flex items-center justify-center text-center p-6">
            <div>
              <p class="text-red-400 mb-4">Something went wrong while loading the app.</p>
              <p class="text-zinc-400">Open browser console (F12) and check for errors.</p>
            </div>
          </div>`;
      }
    };
  </script>
</body>
</html>
