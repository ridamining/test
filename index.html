<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIDA NETWORK</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:#fff;
}

.container{
  padding:15px;
}

.card{
  background:#12182b;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 0 10px rgba(0,255,255,0.1);
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#00f2ff,#0066ff);
  color:white;
  font-weight:bold;
  width:100%;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}

.hidden{display:none;}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.nav div{
  flex:1;
  text-align:center;
  padding:10px;
  cursor:pointer;
}

.active{
  background:#00f2ff;
  color:#000;
}

.mining{
  font-size:22px;
  text-align:center;
  margin:20px 0;
}

.admin-panel{
  background:#1a1f35;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="auth" class="container">
  <h2>RIDA NETWORK</h2>

  <div class="card">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
  </div>
</div>

<div id="app" class="hidden">

<div class="container">

  <div class="card">
    <h3>📢 Broadcast</h3>
    <p id="broadcast"></p>
  </div>

  <div class="card">
    <h3>Balance</h3>
    <h1 id="balance">0</h1>
  </div>

  <div class="card">
    <div class="mining" id="miningStatus">Idle</div>
    <button onclick="startMining()">Start Mining</button>
    <button onclick="claim()">Claim Reward</button>
  </div>

  <div class="card">
    <h3>Withdraw</h3>
    <input id="amount" placeholder="Amount">
    <input id="wallet" placeholder="Wallet Address">
    <button onclick="withdraw()">Withdraw</button>
  </div>

  <div class="card hidden" id="adminPanel">
    <h3>👑 Admin Panel</h3>
    <button onclick="loadUsers()">Load Users</button>
    <div id="users"></div>

    <input id="broadcastMsg" placeholder="Broadcast message">
    <button onclick="sendBroadcast()">Send Broadcast</button>
  </div>

</div>

<div class="nav">
  <div onclick="showPage('home')" class="active">Home</div>
  <div onclick="showPage('admin')">Admin</div>
</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbzFwjQRnPDSlvqyHwYSiqFkqEZB73YAEK7R5ToKpO9VRkx_x5ZkpCC0kM2GHilQ0tYS/exec";

let token = localStorage.getItem("token");

// ------------------ AUTH ------------------

async function register(){
  let res = await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"register",
      email:email.value,
      password:password.value
    })
  });
  let data = await res.json();
  alert(JSON.stringify(data));
}

async function login(){
  let res = await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"login",
      email:email.value,
      password:password.value
    })
  });

  let data = await res.json();

  if(data.success){
    localStorage.setItem("token",data.token);
    token = data.token;
    loadApp();
  }else{
    alert(data.error);
  }
}

// ------------------ APP ------------------

async function loadApp(){
  document.getElementById("auth").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  let res = await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"getStatus",
      token
    })
  });

  let data = await res.json();

  balance.innerText = data.balance;
  broadcast.innerText = data.broadcast;
  miningStatus.innerText = "Last mining: " + new Date(data.lastMining).toLocaleString();

  if(data.role === "admin"){
    adminPanel.classList.remove("hidden");
  }
}

// ------------------ MINING ------------------

async function startMining(){
  let res = await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"startMining",token})
  });
  let data = await res.json();
  alert(JSON.stringify(data));
}

async function claim(){
  let res = await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"claimMining",token})
  });
  let data = await res.json();

  if(data.success){
    balance.innerText = data.balance;
  }

  alert(JSON.stringify(data));
}

// ------------------ WITHDRAW ------------------

async function withdraw(){
  let res = await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"withdraw",
      token,
      amount:parseFloat(amount.value),
      wallet:wallet.value
    })
  });

  let data = await res.json();
  alert(JSON.stringify(data));
}

// ------------------ ADMIN ------------------

async function loadUsers(){
  let res = await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"getUsers",token})
  });

  let data = await res.json();

  let html = "";
  data.users.slice(1).forEach(u=>{
    html += `
      <div class="card">
        ${u[1]} | ${u[4]} | ${u[7]}
        <button onclick="verify('${u[0]}')">Verify KYC</button>
      </div>
    `;
  });

  users.innerHTML = html;
}

async function verify(id){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"updateKYC",
      token,
      userId:id,
      status:"verified"
    })
  });

  loadUsers();
}

async function sendBroadcast(){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"broadcast",
      token,
      message:broadcastMsg.value
    })
  });

  alert("Sent");
}

// ------------------

if(token){
  loadApp();
}

</script>

</body>
</html>
