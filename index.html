<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIDA NETWORK</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0a0f1f,#05070f);
  color:#fff;
}

.header{text-align:center;padding:15px;font-size:20px;font-weight:bold;}

.card{
  margin:15px;
  padding:15px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
}

input,button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:10px;
}

button{background:#00c6ff;color:#fff;}

.nav{
  position:fixed;bottom:0;width:100%;display:flex;background:#000;
}
.nav div{flex:1;text-align:center;padding:10px;color:#888;}
.nav .active{color:#00f2ff;}

.page{display:none;}
.activePage{display:block;}

.mine-btn{
  width:150px;height:150px;border-radius:50%;
  background:#00f2ff;color:#000;font-size:18px;
}
</style>
</head>

<body>

<div class="header">⚡ RIDA NETWORK</div>

<!-- LOGIN -->
<div id="auth" class="page activePage">
  <div class="card">
    <h3>Login</h3>
    <input id="email" placeholder="Email">
    <input id="password" placeholder="Password">
    <button onclick="login()">Login</button>

    <h3>Register</h3>
    <button onclick="register()">Register</button>
  </div>
</div>

<!-- HOME -->
<div id="home" class="page">
  <div class="card">
    Balance: <b id="balance">0</b><br>
    KYC: <b id="kyc"></b>
  </div>

  <div class="card">
    <button class="mine-btn" onclick="startMining()">Mine</button>
    <button onclick="claim()">Claim</button>
  </div>
</div>

<!-- WALLET -->
<div id="wallet" class="page">
  <div class="card">
    <input id="toUID" placeholder="Receiver UID">
    <input id="amount" placeholder="Amount">
    <button onclick="transfer()">Send</button>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="page">
  <div class="card">
    <div id="chatBox" style="height:200px;overflow:auto;"></div>
    <input id="msg">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
  <div class="card">
    <input id="bcMsg">
    <button onclick="broadcast()">Broadcast</button>
  </div>
</div>

<div class="nav">
  <div onclick="nav('home')">🏠</div>
  <div onclick="nav('wallet')">💰</div>
  <div onclick="nav('chat')">💬</div>
  <div onclick="nav('admin')">👑</div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxjAOthC5PQwhL9mEB1Tq8PMB8nI6cXEah1kAhQmhpjgaf92RfbUy3_STMzee9zk8YI/exec";

let token=localStorage.getItem("token");

// API helper
async function api(data){
  let r=await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });
  return await r.json();
}

// NAV
function nav(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("activePage"));
  document.getElementById(p).classList.add("activePage");
}

// AUTH
async function register(){
  let d=await api({
    action:"register",
    email:email.value,
    password:password.value
  });

  alert(JSON.stringify(d));
}

async function login(){
  let d=await api({
    action:"login",
    email:email.value,
    password:password.value
  });

  if(d.success){
    token=d.token;
    localStorage.setItem("token",token);
    load();
    nav("home");
  }else alert(d.error);
}

// LOAD
async function load(){
  let d=await api({action:"getStatus",token});

  balance.innerText=d.balance;
  kyc.innerText=d.kycStatus;

  loadChat();
}

// MINING
async function startMining(){
  let d=await api({action:"startMining",token});
  alert(JSON.stringify(d));
}

async function claim(){
  let d=await api({action:"claimMining",token});
  alert(JSON.stringify(d));
  load();
}

// TRANSFER
async function transfer(){
  let d=await api({
    action:"transfer",
    token,
    toUID:toUID.value,
    amount:amount.value
  });

  alert(JSON.stringify(d));
}

// CHAT
async function sendMsg(){
  await api({action:"sendMessage",token,msg:msg.value});
  loadChat();
}

async function loadChat(){
  let d=await api({action:"getMessages",token});
  chatBox.innerHTML="";
  d.messages.forEach(m=>chatBox.innerHTML+=`<div>${m}</div>`);
}

// ADMIN
async function broadcast(){
  let d=await api({action:"broadcast",token,message:bcMsg.value});
  alert(JSON.stringify(d));
}

// AUTO LOGIN
if(token){
  nav("home");
  load();
}

</script>

</body>
</html>
