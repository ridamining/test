<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rida Network</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:#fff;
  text-align:center;
}

.container{
  max-width:400px;
  margin:auto;
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  padding:20px;
  margin-top:20px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

input{
  width:90%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

button{
  margin-top:15px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

button:disabled{
  background:#555;
}

h1{
  margin-top:30px;
}

.small{
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Rida Network</h1>

<!-- LOGIN -->
<div class="card" id="loginBox">
<input id="email" placeholder="Enter Email">
<br>
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">

<div class="card">
<h2 id="balance">0</h2>
<p>RIDA Balance</p>
<p id="status"></p>
</div>

<div class="card">
<button id="mineBtn" onclick="checkIn()">⛏️ Daily Check-In</button>
<p id="timer" class="small"></p>
</div>

<div class="card">
<input id="tx" placeholder="Enter TxID">
<button onclick="submitTx()">Submit Verification</button>
</div>

</div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzCmSR2bmM1KmPBIq2Sc_1lc4rOi5-ihpRhQi7WuWKd3TLVZi_ksUbGsyb1CJRS1YCQlQ/exec";

let user = null;

// 🔹 POST HELPER (IMPORTANT FIX)
async function post(data){
  const res = await fetch(API,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify(data)
  });
  return await res.json();
}

// 🔹 LOGIN
async function login(){
  let email = document.getElementById("email").value.trim();
  if(!email) return alert("Enter email");

  // register
  await post({
    action:"registerUser",
    email:email,
    name:"User",
    pic:"",
    ref:localStorage.getItem("ref") || ""
  });

  // get user
  let res = await post({
    action:"getUser",
    email:email
  });

  if(res.status !== "success"){
    alert("Login failed");
    return;
  }

  user = res.user;

  document.getElementById("loginBox").style.display="none";
  document.getElementById("dashboard").style.display="block";

  updateUI();
}

// 🔹 UPDATE UI
function updateUI(){
  document.getElementById("balance").innerText = user[4];

  let status = user[7];

  if(status === "true"){
    document.getElementById("status").innerText = "✅ Verified";
    document.getElementById("mineBtn").disabled = false;
  } 
  else if(status === "pending"){
    document.getElementById("status").innerText = "⏳ Pending Verification";
    document.getElementById("mineBtn").disabled = true;
  } 
  else{
    document.getElementById("status").innerText = "❌ Not Verified";
    document.getElementById("mineBtn").disabled = true;
  }
}

// 🔹 CHECK-IN
async function checkIn(){
  let res = await post({
    action:"checkIn",
    userId:user[0]
  });

  if(res.status === "success"){
    alert("Mining successful!");
    user[4] = res.balance;
  }
  else if(res.status === "wait"){
    alert("⏳ Come back after 24 hours");
  }
  else if(res.status === "not_verified"){
    alert("❌ Verify account first");
  }
  else{
    alert("Mining ended");
  }

  updateUI();
}

// 🔹 SUBMIT TX
async function submitTx(){
  let tx = document.getElementById("tx").value.trim();
  if(!tx) return alert("Enter TxID");

  await post({
    action:"submitTx",
    userId:user[0],
    email:user[1],
    tx:tx
  });

  alert("Submitted for verification");
}

// 🔹 REFERRAL TRACK
(function(){
  const params = new URLSearchParams(window.location.search);
  const ref = params.get("ref");
  if(ref){
    localStorage.setItem("ref", ref);
  }
})();
</script>

</body>
</html>
