<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RIDA NETWORK V3</title>

<style>
body{
  font-family:sans-serif;
  background:linear-gradient(135deg,#0a0f1f,#111a3a);
  color:#fff;
  text-align:center;
}
input,button{
  width:90%;
  padding:12px;
  margin:6px;
  border-radius:12px;
  border:none;
}
button{
  background:linear-gradient(90deg,#00c6ff,#0072ff);
  color:#fff;
  font-weight:bold;
}
.card{
  background:#111a3a;
  margin:10px;
  padding:15px;
  border-radius:15px;
}
#log{
  font-size:12px;
  color:#00ffcc;
  text-align:left;
  padding:10px;
}
</style>
</head>

<body>

<h2>⚡ RIDA NETWORK V3</h2>

<div id="auth" class="card">
<input id="email" placeholder="Email">
<input id="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">

<div class="card">
<p>💰 Balance: <span id="bal">0</span></p>
<button onclick="startMining()">⛏ Start Mining</button>
<button onclick="claimMining()">🎁 Claim Reward</button>
</div>

<div class="card">
<h3>💸 Transfer</h3>
<input id="uid" placeholder="Receiver UID">
<input id="amt" placeholder="Amount">
<button onclick="transfer()">Send</button>
</div>

<div class="card">
<h3>💬 Chat</h3>
<input id="msg" placeholder="Message">
<button onclick="sendMsg()">Send</button>
<div id="chatBox"></div>
</div>

<div id="log"></div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbydx68s5bKYrYB2w66DcKCBNziLsUG9dFNoKT7w7Ln1VAaoUqwKu5V3BNCP7MfmHy4/exec";

let token=localStorage.getItem("token");

// DEBUG LOGGER
function log(t){
  document.getElementById("log").innerHTML += t+"<br>";
}

// API CALL (FIXED)
async function api(params){
  try{
    const url = API + "?" + new URLSearchParams(params);
    log("➡️ "+url);

    const res = await fetch(url);
    const text = await res.text();

    log("⬅️ "+text);

    return JSON.parse(text);
  }catch(e){
    log("❌ ERROR: "+e);
    return {success:false,error:e.toString()};
  }
}

// AUTH
async function register(){
  let r=await api({
    action:"register",
    email:email.value,
    password:password.value
  });

  alert(JSON.stringify(r));
}

async function login(){
  let r=await api({
    action:"login",
    email:email.value,
    password:password.value
  });

  if(r.success){
    token=r.token;
    localStorage.setItem("token",token);
    startApp();
  }else alert(r.error);
}

// START
function startApp(){
  auth.style.display="none";
  app.style.display="block";
  load();
}

// LOAD DATA
async function load(){
  let r=await api({action:"getStatus",token});
  if(r.success){
    bal.innerText=r.balance;
  }else{
    alert("Session expired");
    localStorage.removeItem("token");
    location.reload();
  }
  loadChat();
}

// MINING
async function startMining(){
  alert(JSON.stringify(await api({action:"startMining",token})));
}

async function claimMining(){
  alert(JSON.stringify(await api({action:"claimMining",token})));
  load();
}

// TRANSFER
async function transfer(){
  alert(JSON.stringify(await api({
    action:"transfer",
    token,
    toUID:uid.value,
    amount:amt.value
  })));
}

// CHAT
async function sendMsg(){
  await api({
    action:"sendMessage",
    token,
    msg:msg.value
  });
  msg.value="";
  loadChat();
}

async function loadChat(){
  let r=await api({action:"getMessages",token});
  if(r.success){
    chatBox.innerHTML=r.messages.join("<br>");
  }
}

// AUTO LOGIN
if(token){
  startApp();
}

</script>

</body>
</html>
