<script>
    // NAVIGATION LOGIC
    function showTab(t) {
        const tabs = ['mining', 'social', 'profile', 'transfer', 'admin'];
        tabs.forEach(tab => {
            const el = document.getElementById('tab-' + tab);
            const nav = document.getElementById('nav-' + tab);
            if (el) el.classList.toggle('hidden', tab !== t);
            
            // Handle Navigation Button Styling
            if (nav) {
                if (tab === t) {
                    nav.classList.add('text-blue-500');
                    nav.classList.remove('text-slate-500');
                } else {
                    nav.classList.remove('text-blue-500');
                    nav.classList.add('text-slate-500');
                }
            }
        });
        
        // Hide drawer if open
        toggleDrawer(false);
        
        // Specific Profile Data Injection
        if (t === 'profile') {
            document.getElementById('pName').innerText = user.name;
            document.getElementById('pEmail').innerText = user.email;
            document.getElementById('pUID').innerText = user.uid;
            document.getElementById('pStatus').innerText = user.status;
            document.getElementById('pJoinDate').innerText = user.joinDate || "01/04/2026";
            document.getElementById('pRefCount').innerText = (user.refCount || 0) + " Users";
            document.getElementById('pAvatar').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.email}`;
            document.getElementById('refUrl').value = `${window.location.origin}${window.location.pathname}?ref=${user.uid}`;
        }
    }
</script>
