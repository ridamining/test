<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rida Network</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#0a0f1c;
  color:#fff;
}

.header{
  padding:15px;
  font-size:20px;
  font-weight:bold;
  text-align:center;
  background:#111827;
}

.container{
  padding:15px;
}

.card{
  background:linear-gradient(145deg,#111827,#1f2937);
  padding:20px;
  border-radius:16px;
  margin-bottom:15px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  margin-top:10px;
  font-weight:bold;
  background:linear-gradient(90deg,#00c853,#00e676);
  color:black;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.03);
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

.hidden{display:none;}

.balance{
  font-size:28px;
  font-weight:bold;
}

.timer{
  font-size:18px;
  margin-top:10px;
  color:#00e676;
}

.admin{
  background:linear-gradient(145deg,#3b0000,#7f1d1d);
}

.glow{
  animation:glow 1s infinite alternate;
}

@keyframes glow{
  from{box-shadow:0 0 5px #00e676;}
  to{box-shadow:0 0 20px #00e676;}
}
</style>
</head>

<body>

<div class="header">🚀 Rida Mining</div>

<div class="container">

<!-- AUTH -->
<div id="authBox" class="card">
  <h2>Login / Register</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<div class="card glow">
  <div class="balance" id="balance">0</div>
  <div>RIDA Balance</div>
</div>

<div class="card">
  <p>Referral Code: <b id="ref"></b></p>
  <p>KYC Status: <b id="kyc"></b></p>
</div>

<div class="card">
  <h3>⛏ Mining</h3>
  <div class="timer" id="timer">Loading...</div>
  <button onclick="startMining()">Start Mining</button>
  <button onclick="claimMining()">Claim Reward</button>
</div>

<div class="card">
  <h3>💸 Withdraw</h3>
  <input id="amount" placeholder="Amount">
  <input id="wallet" placeholder="Wallet Address">
  <button onclick="withdraw()">Request Withdraw</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="card admin hidden">
  <h3>👑 Admin Panel</h3>
  <button onclick="loadWithdraws()">Load Withdraw Requests</button>
  <div id="withdrawList"></div>
</div>

<button onclick="logout()">Logout</button>

</div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwP3T0zDznxDcoLyucOX8AM2NWZOHBFpp8CylTDeCQZ0biLwm2AC1wpxpdDSYYY2yHT/exec";

let token = localStorage.getItem("token");

// AUTH
async function register(){
  let r = await fetch(API,{method:"POST",body:JSON.stringify({
    action:"register",email:email.value,password:password.value
  })});
  let d = await r.json();
  alert(d.success?"Registered!":d.error);
}

async function login(){
  let r = await fetch(API,{method:"POST",body:JSON.stringify({
    action:"login",email:email.value,password:password.value
  })});
  let d = await r.json();
  if(d.error) return alert(d.error);
  token=d.token;
  localStorage.setItem("token",token);
  loadDashboard();
}

function logout(){
  localStorage.removeItem("token");
  location.reload();
}

// DASHBOARD
async function loadDashboard(){
  authBox.classList.add("hidden");
  dashboard.classList.remove("hidden");

  let r = await fetch(API,{method:"POST",body:JSON.stringify({
    action:"getStatus",token
  })});
  let d = await r.json();

  balance.innerText = d.balance;
  ref.innerText = d.referralCode;
  kyc.innerText = d.kycStatus;

  if(d.role==="admin"){
    adminPanel.classList.remove("hidden");
  }

  startTimer(d.lastMining);
}

// MINING
async function startMining(){
  let r = await fetch(API,{method:"POST",body:JSON.stringify({
    action:"startMining",token
  })});
  let d = await r.json();
  alert(d.error||"Mining Started");
  loadDashboard();
}

async function claimMining(){
  let r = await fetch(API,{method:"POST",body:JSON.stringify({
    action:"claimMining",token
  })});
  let d = await r.json();
  alert(d.error||"Reward Claimed");
  if(d.balance) balance.innerText=d.balance;
}

// TIMER
function startTimer(last){
  function update(){
    let now=Date.now();
    let diff=86400000-(now-last);

    if(diff<=0){
      timer.innerText="✅ Ready to Claim";
      return;
    }

    let h=Math.floor(diff/3600000);
    let m=Math.floor((diff%3600000)/60000);
    let s=Math.floor((diff%60000)/1000);

    timer.innerText=`${h}h ${m}m ${s}s`;
  }
  setInterval(update,1000);
}

// WITHDRAW
async function withdraw(){
  let r = await fetch(API,{method:"POST",body:JSON.stringify({
    action:"withdraw",
    token,
    amount:amount.value,
    wallet:wallet.value
  })});
  let d = await r.json();
  alert(d.error||"Requested");
}

// ADMIN LOAD WITHDRAW (UI only)
async function loadWithdraws(){
  withdrawList.innerHTML="⚠️ Add backend API for listing withdrawals";
}

// AUTO LOGIN
if(token){
  loadDashboard();
}
</script>

</body>
</html>
