<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rida Network - Mine Rida Daily</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #fff;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 420px;
      margin: 80px auto;
      padding: 40px 24px;
      background: #111;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
    }
    .btn {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary {
      background: #10b981;
      color: white;
    }
    .btn-primary:hover {
      background: #059669;
    }
    .btn-secondary {
      background: transparent;
      border: 2px solid #555;
      color: #ddd;
    }
    .btn-secondary:hover {
      background: #222;
    }
    input {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      background: #1f1f1f;
      border: 1px solid #444;
      border-radius: 12px;
      color: white;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div id="app" class="min-h-screen"></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyMYNHXZ7g40fD6GVpSFMWCHFh6leDEqij-HeZ8i5RWUR5JFvXlTZc3XJ2DEa_LjAEF/exec";
    let currentToken = localStorage.getItem('ridaToken') || null;

    function showToast(msg, type = 'success') {
      const t = document.createElement('div');
      t.style.cssText = `position:fixed;bottom:30px;right:30px;padding:16px 24px;border-radius:12px;color:white;z-index:9999;${type==='success'?'background:#10b981':'background:#ef4444'}`;
      t.innerHTML = `<i class="fa-solid \( {type==='success'?'fa-check-circle':'fa-exclamation-circle'} mr-2"></i> \){msg}`;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 4000);
    }

    async function apiCall(action, body = {}) {
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({action, token: currentToken, ...body})
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || 'Failed');
        return data;
      } catch (err) {
        showToast(err.message || 'Cannot connect to server', 'error');
        throw err;
      }
    }

    function renderLanding() {
      document.getElementById('app').innerHTML = `
        <div class="container">
          <div style="font-size:80px;margin-bottom:20px;">⛏️</div>
          <h1 style="font-size:42px;margin-bottom:8px;">Rida Network</h1>
          <p style="color:#aaa;font-size:18px;margin-bottom:30px;">Claim 5 Rida every 24 hours</p>
          <button onclick="showLogin()" class="btn btn-primary">Login</button>
          <button onclick="showRegister()" class="btn btn-secondary">Join Free</button>
        </div>`;
    }

    function showLogin() {
      document.getElementById('app').innerHTML = `
        <div class="container">
          <h2 style="font-size:28px;margin-bottom:24px;">Login</h2>
          <input id="email" type="email" placeholder="Email">
          <input id="password" type="password" placeholder="Password">
          <button onclick="handleLogin()" class="btn btn-primary">Login</button>
          <p style="margin-top:20px;color:#aaa;">New user? <span onclick="showRegister()" style="color:#10b981;cursor:pointer;">Register</span></p>
        </div>`;
    }

    function showRegister() {
      document.getElementById('app').innerHTML = `
        <div class="container">
          <h2 style="font-size:28px;margin-bottom:24px;">Create Account</h2>
          <input id="email" type="email" placeholder="Email">
          <input id="password" type="password" placeholder="Password">
          <button onclick="handleRegister()" class="btn btn-primary">Register</button>
          <p style="margin-top:20px;color:#aaa;">Already have account? <span onclick="showLogin()" style="color:#10b981;cursor:pointer;">Login</span></p>
        </div>`;
    }

    async function handleRegister() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!email || !password) return showToast('Please fill all fields', 'error');
      try {
        await apiCall('register', {email, password});
        showToast('Account created! Please login.', 'success');
        showLogin();
      } catch(e) {}
    }

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!email || !password) return showToast('Please fill all fields', 'error');
      try {
        const data = await apiCall('login', {email, password});
        currentToken = data.token;
        localStorage.setItem('ridaToken', currentToken);
        showToast('Login successful! 🎉', 'success');
        document.getElementById('app').innerHTML = `
          <div class="container text-center">
            <p style="font-size:32px;margin-bottom:16px;">✅ Welcome!</p>
            <p style="color:#10b981;">You are logged in.<br>Full dashboard with claim button coming next.</p>
          </div>`;
      } catch(e) {}
    }

    // Start
    window.onload = renderLanding;
  </script>
</body>
</html>
