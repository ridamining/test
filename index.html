<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyxYat7kzNr2xZ4X0I16BFUTDXd1gtZfXz0gGAhSAuzBYfbgpu_85vPfXCeb51gBS7Fgg/exec";

    async function fetchSheetData() {
        const tbody = document.getElementById('adminTableBody');
        if (!tbody) return; // Safety check
        
        tbody.innerHTML = '<tr><td colspan="3" class="p-10 text-center text-blue-500 font-black animate-pulse">CONNECTING TO CLOUD...</td></tr>';
        
        try {
            // Adding 'cache: no-store' helps prevent old data from sticking
            const response = await fetch(WEB_APP_URL, { method: 'GET', cache: 'no-store' });
            
            if (!response.ok) throw new Error('Network Error');
            
            const data = await response.json();

            if (!data || data.length < 2) {
                tbody.innerHTML = '<tr><td colspan="3" class="p-10 text-center opacity-40">SHEET IS EMPTY</td></tr>';
                return;
            }

            tbody.innerHTML = data.slice(1).map(row => `
                <tr class="border-b border-white/5">
                    <td class="p-4 font-black">${row[1] || 'N/A'}<br><span class="text-[7px] opacity-30">${row[0] || ''}</span></td>
                    <td class="p-4"><span class="bg-blue-600/10 text-blue-500 px-2 py-1 rounded text-[8px] font-black">${row[3] || 'UNVERIFIED'}</span></td>
                    <td class="p-4 text-right"><button onclick="approveUser('${row[1]}')" class="bg-blue-600 px-3 py-1 rounded-lg text-[8px] font-black">APPROVE</button></td>
                </tr>
            `).join('');

        } catch (err) {
            tbody.innerHTML = `<tr><td colspan="3" class="p-10 text-center text-red-500 font-black">CONNECTION FAILED<br><span class="text-[8px] opacity-50">${err.message}</span></td></tr>`;
        }
    }
    
    // Make sure all your other functions (masterLogin, etc.) are inside this same <script> block
</script>
