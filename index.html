<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIDA NETWORK</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#050508;color:#fff;font-family:sans-serif}
.glass{background:rgba(255,255,255,0.05);padding:12px;border-radius:14px}
.page{display:none}
.active{display:block}
.nav{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;background:#0b0f1a;padding:10px}
.nav div{font-size:12px;opacity:.6}
.nav .on{color:#6366f1;opacity:1}
</style>
</head>

<body class="p-3">

<!-- AUTH -->
<div id="auth">
<input id="name" placeholder="Name"><br><br>
<input id="email" placeholder="Email"><br><br>
<input id="pass" placeholder="Password"><br><br>
<input id="ref" placeholder="Referral UID (optional)"><br><br>
<button onclick="login()">Login / Signup</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<!-- HEADER -->
<div class="glass flex justify-between">
<div>
<h3 id="uname"></h3>
<p id="uid"></p>
<p id="verify"></p>
</div>
<div>
<h2 id="bal">0</h2>
<p>RIDA</p>
</div>
</div>

<!-- HOME -->
<div id="home" class="page active">

<div class="glass mt-3 text-center">
<button id="mineBtn" onclick="mineAction()">Start Mining</button>
<p id="timer"></p>
</div>

<div class="glass mt-3">
<h3>📢 Announcements</h3>
<div id="ann"></div>
<button onclick="showAllAnn()">More</button>
</div>

</div>

<!-- ASSETS -->
<div id="asset" class="page">

<div class="glass">
<input id="refLink">
</div>

<div class="glass mt-2">
<h3>Referrals</h3>
<div id="refs"></div>
</div>

<div class="glass mt-2">
<h3>P2P Transfer</h3>
<input id="to" placeholder="Receiver UID"><br><br>
<input id="amt" placeholder="Amount"><br><br>
<button onclick="sendP2P()">Send</button>
</div>

<div class="glass mt-2">
<h3>Chat</h3>
<div id="chatBox" style="height:150px;overflow:auto"></div>
<input id="msg">
<button onclick="sendMsg()">Send</button>
</div>

</div>

<!-- ADMIN -->
<div id="admin" class="page">

<div class="glass">
<input id="search" placeholder="Search UID">
<button onclick="loadUsers()">Search</button>
</div>

<div id="users"></div>

</div>

<!-- NAV -->
<div class="nav">
<div onclick="tab('home',this)" class="on">Home</div>
<div onclick="tab('asset',this)">Assets</div>
<div id="adminBtn" onclick="tab('admin',this)" class="hidden">Admin</div>
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxRRJfvA6I1w5qWvlocU8Gcke_a19i_p7czfIQTYJPfEvs-b-imFxT9CPMmPbAifv4E2g/exec";

let user=JSON.parse(localStorage.getItem("u"));

function call(a,d,cb){
fetch(API+"?action="+a+"&payload="+encodeURIComponent(JSON.stringify(d)))
.then(r=>r.json()).then(cb);
}

// LOGIN
function login(){
call("login",{
name:name.value,email:email.value,pass:pass.value,ref:ref.value
},res=>{
if(res.success){
localStorage.setItem("u",JSON.stringify(res.user));
location.reload();
}else alert(res.msg);
});
}

// LOAD
if(user) sync();

function sync(){
call("sync",{uid:user.uid},res=>{
user=res.user;
localStorage.setItem("u",JSON.stringify(user));

auth.style.display="none";
app.classList.remove("hidden");

uname.innerText=user.name;
uid.innerText=user.uid;
bal.innerText=user.bal;
verify.innerText=user.verified;

refLink.value=location.origin+"?ref="+user.uid;

loadRefs(res.referrals);
loadAnn(res.announcements);

if(user.role=="ADMIN"){
adminBtn.classList.remove("hidden");
loadUsers(res.allUsers);
}

startTimer();
loadChat();
});
}

// MINING
function mineAction(){
if(user.miningStart){
call("claimMining",{uid:user.uid},sync);
}else{
call("startMining",{uid:user.uid},sync);
}
}

function startTimer(){
setInterval(()=>{
if(!user.miningStart) return;

let left=86400000-(Date.now()-user.miningStart);
if(left<0){timer.innerText="Claim Ready";return;}

let h=Math.floor(left/3600000);
let m=Math.floor((left%3600000)/60000);
let s=Math.floor((left%60000)/1000);

timer.innerText=h+":"+m+":"+s;
},1000);
}

// REF
function loadRefs(r){
refs.innerHTML=r.map(x=>`
<div class="glass mt-2">${x.name} (${x.uid})</div>
`).join("");
}

// ANN
function loadAnn(a){
ann.innerHTML=a.slice(0,3).map(x=>`
<div>${x[0]} - ${x[1]}</div>
`).join("");
}

// CHAT
function sendMsg(){
call("sendMsg",{from:user.uid,to:"ADMIN",msg:msg.value},loadChat);
}

function loadChat(){
call("getMsg",{uid:user.uid},res=>{
chatBox.innerHTML=res.msgs.map(m=>`
<div>${m[0]}: ${m[2]}</div>
`).join("");
});
}

// P2P
function sendP2P(){
call("p2p",{from:user.uid,to:to.value,amount:Number(amt.value)},sync);
}

// ADMIN
function loadUsers(list){
if(!list){
call("sync",{uid:user.uid},r=>loadUsers(r.allUsers));
return;
}

users.innerHTML=list.map(u=>`
<div class="glass mt-2">
${u.name} (${u.uid})<br>
Bal: ${u.bal}<br>

<input id="b_${u.uid}" placeholder="Balance">
<button onclick="setBal('${u.uid}')">Set</button>
<button onclick="verifyU('${u.uid}')">Verify</button>
<button onclick="banU('${u.uid}')">Ban</button>
</div>
`).join("");
}

function setBal(id){
call("adminAction",{uid:id,type:"setBalance",value:document.getElementById("b_"+id).value},sync);
}
function verifyU(id){
call("adminAction",{uid:id,type:"verify"},sync);
}
function banU(id){
call("adminAction",{uid:id,type:"ban"},sync);
}

// NAV
function tab(id,el){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');

document.querySelectorAll('.nav div').forEach(n=>n.classList.remove('on'));
el.classList.add('on');
}

</script>
</body>
</html>
