<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIDA NETWORK</title>

<style>
body{margin:0;font-family:sans-serif;background:#0a0f1f;color:#fff}
.header{display:flex;justify-content:space-between;padding:15px;background:#111}
.menu-btn{font-size:20px;cursor:pointer}
.drawer{position:fixed;top:0;left:-250px;width:250px;height:100%;background:#111827;transition:0.3s;padding:20px;z-index:1000}
.drawer.active{left:0}
.drawer div{padding:15px;border-bottom:1px solid #333;cursor:pointer}
.page{display:none;padding:15px}
.active-page{display:block}
.card{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);padding:15px;border-radius:15px;margin-bottom:15px}
button{padding:12px;width:100%;border:none;border-radius:10px;background:linear-gradient(45deg,#00f2ff,#0066ff);color:white;font-weight:bold;margin-top:5px}
input{width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px}
.mining-circle{width:150px;height:150px;border-radius:50%;border:5px solid #00f2ff;margin:auto;display:flex;align-items:center;justify-content:center;animation:spin 5s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.counter{text-align:center;font-size:20px;margin-top:10px}
</style>
</head>

<body>

<div class="header">
  <div class="menu-btn" onclick="toggleDrawer()">☰</div>
  <div>RIDA NETWORK</div>
</div>

<div id="drawer" class="drawer">
  <div onclick="showPage('home')">🏠 Home</div>
  <div onclick="showPage('mining')">⛏ Mining</div>
  <div onclick="showPage('wallet')">💰 Wallet</div>
  <div onclick="showPage('profile')">👤 Profile</div>
  <div onclick="showPage('admin')">👑 Admin</div>
</div>

<!-- HOME -->
<div id="home" class="page active-page">
  <div class="card">
    <h3>📢 Broadcast</h3>
    <p id="broadcast"></p>
  </div>
  <div class="card">
    <h2>Balance</h2>
    <h1 id="balance">0</h1>
  </div>
</div>

<!-- MINING -->
<div id="mining" class="page">
  <div class="card">
    <div class="mining-circle">⚡</div>
    <div class="counter" id="counter">Loading...</div>
    <button id="mineBtn" onclick="startMining()">Start Mining</button>
    <button onclick="claim()">Claim Reward</button>
  </div>
</div>

<!-- WALLET -->
<div id="wallet" class="page">
  <div class="card">
    <input id="amount" placeholder="Amount">
    <input id="walletAddr" placeholder="Wallet Address">
    <button onclick="withdraw()">Withdraw</button>
  </div>
</div>

<!-- PROFILE -->
<div id="profile" class="page">
  <div class="card">
    <p><b>Email:</b> <span id="pEmail"></span></p>
    <p><b>User ID:</b> <span id="pId"></span></p>
    <p><b>KYC:</b> <span id="pKyc"></span></p>
    <p><b>Referral Code:</b> <span id="pRef"></span></p>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
  <div class="card">
    <button onclick="loadUsers()">Load Users</button>
    <div id="users"></div>
  </div>
  <div class="card">
    <input id="broadcastMsg" placeholder="Broadcast message">
    <button onclick="sendBroadcast()">Send Broadcast</button>
  </div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzFwjQRnPDSlvqyHwYSiqFkqEZB73YAEK7R5ToKpO9VRkx_x5ZkpCC0kM2GHilQ0tYS/exec";

let token=localStorage.getItem("token");
let miningActive=false;

// DRAWER
function toggleDrawer(){
  drawer.classList.toggle("active");
}

// NAVIGATION
function showPage(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active-page"));
  document.getElementById(p).classList.add("active-page");
}

// LOAD APP
async function load(){
  let res=await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"getStatus",token})
  });

  let d=await res.json();

  balance.innerText=d.balance;
  broadcast.innerText=d.broadcast;

  pEmail.innerText=d.email;
  pId.innerText=d.userId;
  pKyc.innerText=d.kycStatus;
  pRef.innerText=d.referralCode;

  const now=Date.now();
  const last=d.lastMining;

  if(now-last<86400000){
    miningActive=true;
    mineBtn.innerText="Mining Active";
    startTimer(last);
  }else{
    miningActive=false;
    mineBtn.innerText="Start Mining";
    counter.innerText="Ready to start";
  }

  if(d.role!=="admin"){
    document.querySelector('[onclick="showPage(\'admin\')"]').style.display="none";
  }
}

// TIMER
function startTimer(last){
  setInterval(()=>{
    const now=Date.now();
    const remain=86400000-(now-last);

    if(remain<=0){
      counter.innerText="Ready to claim";
      miningActive=false;
      mineBtn.innerText="Start Mining";
      return;
    }

    let h=Math.floor(remain/3600000);
    let m=Math.floor((remain%3600000)/60000);
    let s=Math.floor((remain%60000)/1000);

    counter.innerText=`${h}h ${m}m ${s}s`;
  },1000);
}

// START MINING
async function startMining(){
  if(miningActive){
    alert("Mining already active");
    return;
  }

  let r=await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"startMining",token})
  });

  let d=await r.json();

  if(d.success){
    miningActive=true;
    mineBtn.innerText="Mining Active";
    startTimer(Date.now());
  }else{
    alert(d.error);
  }
}

// CLAIM
async function claim(){
  if(miningActive){
    alert("Not ready yet");
    return;
  }

  let r=await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"claimMining",token})
  });

  let d=await r.json();

  if(d.success){
    balance.innerText=d.balance;
    counter.innerText="Reward claimed";
  }else{
    alert(d.error);
  }
}

// WITHDRAW
async function withdraw(){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"withdraw",
      token,
      amount:parseFloat(amount.value),
      wallet:walletAddr.value
    })
  });
  alert("Requested");
}

// ADMIN
async function loadUsers(){
  let r=await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"getUsers",token})
  });

  let d=await r.json();

  users.innerHTML="";
  d.users.slice(1).forEach(u=>{
    users.innerHTML+=`
      <div class="card">
        <b>${u[1]}</b><br>
        Balance: ${u[4]}<br>
        KYC: ${u[7]}<br>
        <button onclick="verify('${u[0]}')">Verify</button>
        <button onclick="reject('${u[0]}')">Reject</button>
      </div>
    `;
  });
}

async function verify(id){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"updateKYC",
      token,
      userId:id,
      status:"verified"
    })
  });
  loadUsers();
}

async function reject(id){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"updateKYC",
      token,
      userId:id,
      status:"rejected"
    })
  });
  loadUsers();
}

async function sendBroadcast(){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"broadcast",
      token,
      message:broadcastMsg.value
    })
  });
  alert("Broadcast sent");
}

// AUTO LOAD
if(token){
  load();
}

</script>

</body>
</html>
