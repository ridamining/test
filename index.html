<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIDA OS | ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root { --blue-glow: 0 0 20px rgba(59, 130, 246, 0.5); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; overflow-x: hidden; }
        
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
        .neon-border { border: 1px solid rgba(59, 130, 246, 0.3); box-shadow: var(--blue-glow); }
        .mining-ring { border: 4px solid #0f172a; border-top-color: #3b82f6; animation: spin 2s linear infinite; }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        .drawer { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .hidden { display: none !important; }
        
        /* Chat Bubbles */
        .msg-user { background: #3b82f6; border-radius: 18px 18px 0 18px; margin-left: auto; }
        .msg-admin { background: #1e293b; border-radius: 18px 18px 18px 0; }
    </style>
</head>
<body class="pb-20">

    <div id="drawer" class="fixed inset-y-0 left-0 w-80 glass z-[100] -translate-x-full drawer p-8">
        <div class="flex justify-between items-center mb-12">
            <h2 class="text-2xl font-black italic text-blue-500 tracking-tighter">RIDA <span class="text-white">PRO</span></h2>
            <button onclick="toggleDrawer(false)" class="p-2 hover:bg-white/10 rounded-full transition-all"><i data-lucide="x"></i></button>
        </div>
        
        <nav class="space-y-3">
            <button onclick="showTab('mining')" class="w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-blue-600/10 hover:text-blue-400 transition-all font-bold text-sm"><i data-lucide="zap"></i> Mining Center</button>
            <button onclick="showTab('announcements')" class="w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-blue-600/10 hover:text-blue-400 transition-all font-bold text-sm"><i data-lucide="megaphone"></i> Global Broadcasts</button>
            <button onclick="showTab('support')" class="w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-blue-600/10 hover:text-blue-400 transition-all font-bold text-sm"><i data-lucide="message-circle"></i> 1-on-1 Support</button>
            
            <div id="adminAccess" class="hidden pt-6 mt-6 border-t border-white/10">
                <p class="text-[10px] font-black text-slate-500 uppercase mb-4 px-4 tracking-widest">Master Terminal</p>
                <button onclick="showTab('admin')" class="w-full flex items-center gap-4 p-4 rounded-2xl bg-blue-600/20 text-blue-400 border border-blue-500/20 font-black text-sm"><i data-lucide="shield-check"></i> COMMAND CENTER</button>
            </div>
        </nav>

        <button onclick="logout()" class="absolute bottom-10 left-8 flex items-center gap-2 text-red-500/60 font-bold text-xs hover:text-red-500"><i data-lucide="log-out" class="w-4 h-4"></i> Disconnect Node</button>
    </div>

    <div id="mainApp" class="hidden">
        <header class="p-6 flex justify-between items-center sticky top-0 glass z-50 rounded-b-3xl">
            <button onclick="toggleDrawer(true)" class="p-3 bg-blue-600/10 rounded-2xl text-blue-500 border border-blue-500/20 active:scale-90 transition-all"><i data-lucide="menu"></i></button>
            <div class="flex flex-col items-end">
                <span id="hStatus" class="text-[10px] font-black uppercase tracking-widest px-3 py-1 bg-red-500/10 text-red-500 border border-red-500/20 rounded-lg">Unverified</span>
                <p id="hUID" class="text-[8px] font-bold text-slate-500 mt-2">NODE ID: --</p>
            </div>
        </header>

        <main class="p-6">
            <div id="tab-mining" class="space-y-6 animate-in fade-in slide-in-from-bottom duration-500">
                <div class="glass p-10 rounded-[3rem] text-center border-t border-blue-500/30 relative overflow-hidden shadow-2xl">
                    <div class="relative z-10">
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] mb-4">Total Cloud Balance</p>
                        <h2 class="text-5xl font-black tracking-tighter mb-10"><span id="balance">0.000000</span> <span class="text-xs text-blue-500 uppercase">RIDA</span></h2>
                        
                        <div class="w-48 h-48 mx-auto mb-10 relative flex items-center justify-center">
                            <div id="ring" class="absolute inset-0 rounded-full border-4 border-slate-900 border-t-blue-500 transition-all"></div>
                            <div class="text-center">
                                <span id="timer" class="text-2xl font-black block">24:00:00</span>
                                <span class="text-[8px] font-bold text-slate-500 uppercase">Node Uptime</span>
                            </div>
                        </div>
                        
                        <button id="mineBtn" onclick="startMining()" class="w-full bg-blue-600 hover:bg-blue-700 py-6 rounded-[2rem] font-black uppercase text-xs tracking-widest shadow-xl shadow-blue-900/40 active:scale-95 transition-all">Launch Mining Node</button>
                    </div>
                </div>
            </div>

            <div id="tab-admin" class="hidden space-y-6">
                <div class="flex justify-between items-center bg-slate-900/50 p-6 rounded-3xl border border-blue-500/20">
                    <h2 class="text-xl font-black text-blue-500 italic uppercase">Network Control</h2>
                    <div class="text-right">
                        <p id="totalUsers" class="text-lg font-black">0</p>
                        <p class="text-[8px] text-slate-500 font-bold">ACTIVE NODES</p>
                    </div>
                </div>
                <div id="adminUserList" class="space-y-4 pb-20">
                    </div>
            </div>

            <div id="tab-support" class="hidden flex flex-col h-[75vh]">
                <div id="chatBox" class="flex-1 overflow-y-auto space-y-4 p-4 glass rounded-[2.5rem] mb-4 border border-white/5 shadow-inner">
                    <div class="msg-admin p-4 text-xs max-w-[85%] text-slate-300">Welcome to RIDA OS Support. How can we assist your node today?</div>
                </div>
                <div class="p-3 glass rounded-full flex gap-2 border border-white/10 shadow-2xl">
                    <input id="chatIn" class="flex-1 bg-transparent px-6 text-sm outline-none" placeholder="Type a message...">
                    <button onclick="sendChat()" class="bg-blue-600 p-4 rounded-full shadow-lg active:scale-90 transition-all"><i data-lucide="send" class="w-5 h-5"></i></button>
                </div>
            </div>
        </main>
    </div>

    <div id="authPage" class="min-h-screen flex items-center justify-center p-8 bg-[#020617] relative">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-blue-900/20 via-transparent to-transparent"></div>
        <div class="glass w-full max-w-sm p-12 rounded-[3.5rem] text-center border-t border-blue-500/20 shadow-2xl relative z-10">
            <h1 class="text-5xl font-black italic text-blue-500 mb-2 tracking-tighter uppercase">Rida</h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.5em] mb-12">Protocol v2.0</p>
            
            <input type="email" id="aEmail" class="w-full bg-slate-900/50 p-5 rounded-2xl mb-4 outline-none border border-white/5 text-sm focus:border-blue-500 transition-all placeholder:text-slate-700" placeholder="Node Email">
            <input type="password" id="aPass" class="w-full bg-slate-900/50 p-5 rounded-2xl mb-12 outline-none border border-white/5 text-sm focus:border-blue-500 transition-all placeholder:text-slate-700" placeholder="Access Key">
            
            <button onclick="auth()" class="w-full bg-blue-600 hover:bg-blue-700 py-6 rounded-[2rem] font-black uppercase text-xs tracking-widest shadow-xl shadow-blue-900/40 active:scale-95 transition-all">Initialize Connection</button>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxgc-Q4ij_H4uWS_zYA3d5w6SCiFgdQgm-mLyzkxnuRCFdyo_xVLhUPCMQdBG3kLZJsvQ/exec";
        let user = JSON.parse(localStorage.getItem('rida_pro_max_v8'));

        function init() { 
            lucide.createIcons(); 
            if(user) {
                if(user.email === "adminrida@gmail.com") document.getElementById('adminAccess').classList.remove('hidden');
                loadApp();
            }
        }

        // --- CORE API HANDLER ---
        function callAPI(params, callback) {
            const query = new URLSearchParams(params).toString();
            fetch(`${API}?${query}&callback=handleRes`)
                .catch(() => console.log("Request queued..."));
            if(callback) window.handleRes = callback;
        }

        function auth() {
            const e = document.getElementById('aEmail').value, p = document.getElementById('aPass').value;
            if(!e || !p) return;

            user = { 
                uid: e === "adminrida@gmail.com" ? "MASTER-ROOT" : "RIDA-" + Math.floor(100000 + Math.random()*900000), 
                name: e === "adminrida@gmail.com" ? "Rida Admin" : "Miner", 
                email: e, balance: 0, status: "Unverified" 
            };
            
            localStorage.setItem('rida_pro_max_v8', JSON.stringify(user));
            callAPI({ action: 'register', email: e, password: p, uid: user.uid, name: user.name });
            setTimeout(() => location.reload(), 1500);
        }

        function loadApp() {
            document.getElementById('authPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('hUID').innerText = "NODE ID: " + user.uid;
            document.getElementById('hStatus').innerText = user.status;
            if(user.email === "adminrida@gmail.com") fetchUsers();
            checkMiningStatus();
        }

        // --- ADMIN PANEL FEATURES ---
        function fetchUsers() {
            callAPI({ action: 'getAllUsers', adminEmail: "adminrida@gmail.com", adminPass: "CocoMomoPakistan@786" }, (res) => {
                const list = document.getElementById('adminUserList');
                document.getElementById('totalUsers').innerText = res.data.length;
                list.innerHTML = res.data.map(u => `
                    <div class="glass p-6 rounded-[2rem] border-l-4 ${u.kyc === 'Verified' ? 'border-l-green-500' : 'border-l-red-500'} animate-in fade-in slide-in-from-right duration-300">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="font-black text-xs uppercase tracking-widest text-blue-400">${u.name}</h3>
                                <p class="text-[9px] font-bold text-slate-500">${u.email}</p>
                            </div>
                            <span class="text-[8px] font-black uppercase px-2 py-1 bg-white/5 rounded border border-white/10">${u.kyc}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="manageUser('${u.uid}', 'Verified')" class="flex-1 py-3 bg-green-600/10 text-green-500 text-[9px] font-black uppercase rounded-xl border border-green-500/20 active:scale-95 transition-all">Verify Node</button>
                            <button onclick="manageUser('${u.uid}', 'Banned')" class="flex-1 py-3 bg-red-600/10 text-red-500 text-[9px] font-black uppercase rounded-xl border border-red-500/20 active:scale-95 transition-all">Ban Access</button>
                        </div>
                    </div>
                `).join('');
            });
        }

        function manageUser(uid, status) {
            callAPI({ action: 'updateUser', uid: uid, status: status, adminEmail: "adminrida@gmail.com", adminPass: "CocoMomoPakistan@786" });
            alert("Protocol Updated for: " + uid);
            setTimeout(() => location.reload(), 1000);
        }

        // --- MINING SYSTEM ---
        function startMining() {
            localStorage.setItem('m_s_'+user.uid, Date.now());
            callAPI({ action: 'startMining', uid: user.uid });
            location.reload();
        }

        function checkMiningStatus() {
            const start = localStorage.getItem('m_s_'+user.uid);
            if(start) {
                const btn = document.getElementById('mineBtn');
                btn.innerText = "NODE ONLINE"; btn.disabled = true;
                btn.className = "w-full bg-slate-900 border border-blue-500/20 text-blue-500/60 py-6 rounded-[2rem] font-black uppercase text-xs tracking-widest";
                document.getElementById('ring').classList.add('mining-ring');
                
                setInterval(() => {
                    const elapsed = (Date.now() - start) / 1000;
                    const rem = 86400 - elapsed;
                    if(rem <= 0) { localStorage.removeItem('m_s_'+user.uid); location.reload(); }
                    
                    const h = Math.floor(rem/3600), m = Math.floor((rem%3600)/60), s = Math.floor(rem%60);
                    document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                    document.getElementById('balance').innerText = (parseFloat(user.balance) + (elapsed * (0.2/86400))).toFixed(6);
                }, 1000);
            }
        }

        // --- UI NAVIGATION ---
        function showTab(t) {
            ['mining', 'admin', 'announcements', 'support'].forEach(tab => {
                const el = document.getElementById('tab-'+tab);
                if(el) el.classList.toggle('hidden', tab !== t);
            });
            toggleDrawer(false);
        }

        function toggleDrawer(o) { document.getElementById('drawer').style.transform = o ? "translateX(0)" : "translateX(-100%)"; }
        function logout() { localStorage.clear(); location.reload(); }
        window.onload = init;
    </script>
</body>
</html>
