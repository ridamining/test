<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rida Mining</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0f1a;
  color:white;
}

.container {
  padding:20px;
}

.card {
  background:#121826;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#00c853;
  color:white;
  font-weight:bold;
}

input {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

.hidden { display:none; }

.admin {
  background:#ff1744;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="authBox" class="card">
  <h2>Login / Register</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<div class="card">
  <h3>Balance: <span id="balance">0</span> RIDA</h3>
  <p>Referral Code: <span id="ref"></span></p>
  <p>KYC: <span id="kyc"></span></p>
</div>

<div class="card">
  <h3>Mining</h3>
  <p id="timer">Not started</p>
  <button onclick="startMining()">Start Mining</button>
  <button onclick="claimMining()">Claim Reward</button>
</div>

<div class="card">
  <h3>Withdraw</h3>
  <input id="amount" placeholder="Amount">
  <input id="wallet" placeholder="Wallet Address">
  <button onclick="withdraw()">Request Withdraw</button>
</div>

<div id="adminPanel" class="card hidden admin">
  <h3>Admin Panel</h3>
  <p>You are admin</p>
</div>

<button onclick="logout()">Logout</button>

</div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwP3T0zDznxDcoLyucOX8AM2NWZOHBFpp8CylTDeCQZ0biLwm2AC1wpxpdDSYYY2yHT/exec";

let token = localStorage.getItem("token");

// ------------------ AUTH ------------------

async function register(){
  const res = await fetch(API,{
    method:"POST",
    body: JSON.stringify({
      action:"register",
      email:email.value,
      password:password.value
    })
  });
  const data = await res.json();
  alert(data.success ? "Registered!" : data.error);
}

async function login(){
  const res = await fetch(API,{
    method:"POST",
    body: JSON.stringify({
      action:"login",
      email:email.value,
      password:password.value
    })
  });

  const data = await res.json();

  if(data.error){
    alert(data.error);
  } else {
    token = data.token;
    localStorage.setItem("token", token);
    loadDashboard();
  }
}

function logout(){
  localStorage.removeItem("token");
  location.reload();
}

// ------------------ DASHBOARD ------------------

async function loadDashboard(){
  authBox.classList.add("hidden");
  dashboard.classList.remove("hidden");

  const res = await fetch(API,{
    method:"POST",
    body: JSON.stringify({
      action:"getStatus",
      token:token
    })
  });

  const data = await res.json();

  if(data.error){
    alert("Session expired");
    logout();
    return;
  }

  balance.innerText = data.balance;
  ref.innerText = data.referralCode;
  kyc.innerText = data.kycStatus;

  if(data.role === "admin"){
    adminPanel.classList.remove("hidden");
  }

  startTimer(data.lastMining);
}

// ------------------ MINING ------------------

async function startMining(){
  const res = await fetch(API,{
    method:"POST",
    body: JSON.stringify({
      action:"startMining",
      token:token
    })
  });

  const data = await res.json();
  alert(data.error || "Mining started");
  loadDashboard();
}

async function claimMining(){
  const res = await fetch(API,{
    method:"POST",
    body: JSON.stringify({
      action:"claimMining",
      token:token
    })
  });

  const data = await res.json();

  if(data.error){
    alert(data.error);
  } else {
    alert("Reward claimed!");
    balance.innerText = data.balance;
  }
}

// ------------------ TIMER ------------------

function startTimer(last){
  function update(){
    const now = Date.now();
    const diff = 86400000 - (now - last);

    if(diff <= 0){
      timer.innerText = "Ready to claim";
      return;
    }

    const h = Math.floor(diff/3600000);
    const m = Math.floor((diff%3600000)/60000);
    const s = Math.floor((diff%60000)/1000);

    timer.innerText = `${h}h ${m}m ${s}s`;
  }

  setInterval(update,1000);
}

// ------------------ WITHDRAW ------------------

async function withdraw(){
  const res = await fetch(API,{
    method:"POST",
    body: JSON.stringify({
      action:"withdraw",
      token:token,
      amount:amount.value,
      wallet:wallet.value
    })
  });

  const data = await res.json();
  alert(data.error || "Withdraw requested");
}

// ------------------ AUTO LOGIN ------------------

if(token){
  loadDashboard();
}
</script>

</body>
</html>
