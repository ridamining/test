<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIDA - Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .auth-card { animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="authPage" class="min-h-screen flex flex-col items-center justify-center p-6">
        <div class="mb-8 text-center">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto flex items-center justify-center shadow-lg shadow-blue-500/50 mb-4">
                <i data-lucide="layers" class="w-12 h-12 text-white"></i>
            </div>
            <h1 class="text-3xl font-black tracking-tighter">RIDA <span class="text-blue-500">NETWORK</span></h1>
            <p class="text-gray-400 text-sm">Next Gen POP Crypto Mining</p>
        </div>

        <div class="glass w-full max-w-md p-8 rounded-3xl auth-card">
            <div id="authTitle" class="text-xl font-bold mb-6 text-center">Create Account</div>
            
            <div class="space-y-4">
                <div id="regFields">
                    <label class="text-xs text-gray-400 ml-1">Full Name</label>
                    <input type="text" id="regName" class="w-full bg-slate-900/50 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500" placeholder="John Doe">
                </div>
                
                <div>
                    <label class="text-xs text-gray-400 ml-1">Email Address</label>
                    <input type="email" id="authEmail" class="w-full bg-slate-900/50 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500" placeholder="name@example.com">
                </div>

                <div id="referralField">
                    <label class="text-xs text-gray-400 ml-1">Referral ID (Optional)</label>
                    <input type="text" id="regRef" class="w-full bg-slate-900/50 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500" placeholder="REF12345">
                </div>

                <button onclick="handleAuth()" id="authSubmitBtn" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold transition-all mt-4 shadow-lg shadow-blue-600/20">
                    SIGN UP
                </button>
            </div>

            <div class="mt-6 text-center text-sm">
                <span id="toggleText" class="text-gray-400">Already have an account?</span>
                <button onclick="toggleAuthMode()" id="toggleBtn" class="text-blue-400 font-bold ml-1">Login</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden pb-24">
        <header class="p-4 flex justify-between items-center">
            <button onclick="toggleDrawer()" class="p-2 glass rounded-full"><i data-lucide="menu"></i></button>
            <div class="flex items-center gap-2">
                <img id="userAvatar" src="" class="w-10 h-10 rounded-full border-2 border-blue-500">
                <div>
                    <p class="text-[10px] text-gray-400" id="userUID">UID: --</p>
                    <p class="text-[10px] font-bold text-green-400" id="userStatus">STATUS: --</p>
                </div>
            </div>
            <button onclick="logout()" class="text-red-400 p-2"><i data-lucide="log-out"></i></button>
        </header>

        <main class="px-4 space-y-6">
            <div class="glass rounded-3xl p-8 text-center space-y-4">
                <div id="miningCounter" class="text-3xl font-mono text-blue-400">00:00:00</div>
                <button id="miningBtn" onclick="handleMiningAction()" class="w-full py-4 rounded-2xl bg-blue-600 font-bold">ACTIVATE NODE</button>
            </div>
            </main>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxO526Lycui8XxgSe7Tt8abq9Wndq-1QHmm--wEnY0dt_vTQTxIU-M9HnCMjVjk9nsFWQ/exec";
        let isLoginMode = false;

        // On Load Check
        window.onload = () => {
            const savedUser = localStorage.getItem('rida_user');
            if (savedUser) {
                showApp(JSON.parse(savedUser));
            }
            lucide.createIcons();
        };

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').innerText = isLoginMode ? "Welcome Back" : "Create Account";
            document.getElementById('regFields').classList.toggle('hidden', isLoginMode);
            document.getElementById('referralField').classList.toggle('hidden', isLoginMode);
            document.getElementById('authSubmitBtn').innerText = isLoginMode ? "LOGIN" : "SIGN UP";
            document.getElementById('toggleText').innerText = isLoginMode ? "Don't have an account?" : "Already have an account?";
            document.getElementById('toggleBtn').innerText = isLoginMode ? "Sign Up" : "Login";
        }

        async function handleAuth() {
            const email = document.getElementById('authEmail').value;
            const btn = document.getElementById('authSubmitBtn');
            
            if(!email) return alert("Please enter email");
            
            btn.disabled = true;
            btn.innerText = "Authenticating...";

            try {
                // Mocking API call to your GAS backend for registration/login
                // In production, you'd add a 'login' action to your Google Script
                const mockUser = {
                    uid: "RIDA" + Math.floor(1000 + Math.random() * 9000),
                    email: email,
                    name: document.getElementById('regName').value || "User",
                    status: "Unverified",
                    balance: 0.00
                };

                localStorage.setItem('rida_user', JSON.stringify(mockUser));
                showApp(mockUser);
            } catch (e) {
                alert("Connection Error");
            } finally {
                btn.disabled = false;
            }
        }

        function showApp(user) {
            document.getElementById('authPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userUID').innerText = "UID: " + user.uid;
            document.getElementById('userStatus').innerText = "STATUS: " + user.status;
            document.getElementById('userAvatar').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.uid}`;
            lucide.createIcons();
        }

        function logout() {
            localStorage.removeItem('rida_user');
            location.reload();
        }
    </script>
</body>
</html>
