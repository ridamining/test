<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rida Mining App</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:#fff;
}

.container {
  max-width:400px;
  margin:auto;
  padding:20px;
}

.card {
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}

input,button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}

input {
  background:#0f172a;
  color:#fff;
}

button {
  background:#22c55e;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

button:hover {
  opacity:0.9;
}

.center { text-align:center; }

.hidden { display:none; }

.nav {
  display:flex;
  justify-content:space-between;
  margin-top:20px;
}

.nav button {
  width:32%;
  background:#334155;
}

.admin { background:#ef4444 !important; }
</style>

</head>
<body>

<div class="container">

<h2 class="center">🚀 Rida Mining</h2>

<!-- LOGIN -->
<div id="loginBox" class="card">
  <h3>Login</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p onclick="showRegister()">No account? Register</p>
</div>

<!-- REGISTER -->
<div id="registerBox" class="card hidden">
  <h3>Register</h3>
  <input id="rEmail" placeholder="Email">
  <input id="rPass" type="password" placeholder="Password">
  <input id="ref" placeholder="Referral Code (optional)">
  <button onclick="register()">Register</button>
  <p onclick="showLogin()">Back to login</p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

  <div class="card">
    <h3>Balance: <span id="bal">0</span></h3>
    <p>Referral Code: <span id="refCode"></span></p>
    <p>KYC: <span id="kyc"></span></p>
  </div>

  <div class="card center">
    <h3 id="timer">Loading...</h3>
    <button onclick="claim()">Start Mining</button>
  </div>

  <div class="card">
    <h3>Withdraw</h3>
    <input id="amount" placeholder="Amount">
    <button onclick="withdraw()">Withdraw</button>
  </div>

  <div class="card">
    <h3>KYC</h3>
    <input id="name" placeholder="Full Name">
    <input id="cnic" placeholder="CNIC">
    <button onclick="submitKYC()">Submit KYC</button>
  </div>

  <div class="nav">
    <button onclick="load()">Refresh</button>
    <button onclick="logout()">Logout</button>
    <button id="adminBtn" class="admin hidden" onclick="admin()">Admin</button>
  </div>

</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbw3AR5966w3Va-VNWzbOTeFAx2UCIiYMuf6pGzrE7ji7qTlRI5L9Z8uAw_ehf5IeszX/exec";

let token = localStorage.getItem("token");

if(token) startApp();

/******** API ********/
async function send(data){
  const res = await fetch(API,{
    method:"POST",
    body:JSON.stringify(data)
  });
  return await res.json();
}

/******** AUTH ********/
async function login(){
  const res = await send({
    action:"login",
    email:email.value,
    password:password.value
  });

  if(res.token){
    localStorage.setItem("token",res.token);
    startApp(res.user);
  } else alert(res.error);
}

async function register(){
  const res = await send({
    action:"register",
    email:rEmail.value,
    password:rPass.value,
    ref:ref.value
  });

  alert("Registered! Login now");
  showLogin();
}

function logout(){
  localStorage.removeItem("token");
  location.reload();
}

/******** UI ********/
function showRegister(){
  loginBox.classList.add("hidden");
  registerBox.classList.remove("hidden");
}

function showLogin(){
  registerBox.classList.add("hidden");
  loginBox.classList.remove("hidden");
}

/******** APP ********/
async function startApp(user){
  loginBox.style.display="none";
  registerBox.style.display="none";
  dashboard.style.display="block";

  if(user && user.role==="admin"){
    adminBtn.classList.remove("hidden");
  }

  load();
}

/******** LOAD ********/
async function load(){
  const res = await send({
    action:"getStatus",
    token
  });

  bal.innerText = res.balance;
  refCode.innerText = res.referralCode;
  kyc.innerText = res.kycStatus;

  startTimer(res.remaining);
}

/******** TIMER ********/
function startTimer(ms){
  function update(){
    if(ms<=0){
      timer.innerText="Ready to Mine";
      return;
    }
    let h=Math.floor(ms/3600000);
    let m=Math.floor(ms%3600000/60000);
    let s=Math.floor(ms%60000/1000);
    timer.innerText=`${h}h ${m}m ${s}s`;
    ms-=1000;
    setTimeout(update,1000);
  }
  update();
}

/******** CLAIM ********/
async function claim(){
  const res = await send({
    action:"claim",
    token
  });

  alert(res.success ? "Mining reward added!" : res.error);
  load();
}

/******** WITHDRAW ********/
async function withdraw(){
  const res = await send({
    action:"withdraw",
    token,
    amount:amount.value
  });

  alert(res.success ? "Withdraw requested" : res.error);
}

/******** KYC ********/
async function submitKYC(){
  const res = await send({
    action:"submitKYC",
    token,
    kyc:{
      name:name.value,
      cnic:cnic.value
    }
  });

  alert("KYC Submitted");
}

/******** ADMIN ********/
async function admin(){
  const users = await send({
    action:"getUsers",
    token
  });

  console.log(users);
  alert("Check console for admin data");
}

</script>

</body>
</html>
