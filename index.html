<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIDA NETWORK</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0a0f1f;
  color:#fff;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#111;
}

.menu-btn{
  font-size:20px;
  cursor:pointer;
}

/* DRAWER */
.drawer{
  position:fixed;
  top:0;
  left:-250px;
  width:250px;
  height:100%;
  background:#111827;
  transition:0.3s;
  padding:20px;
}

.drawer.active{
  left:0;
}

.drawer div{
  padding:15px;
  border-bottom:1px solid #333;
  cursor:pointer;
}

/* PAGE */
.page{
  display:none;
  padding:15px;
}

.active-page{
  display:block;
}

/* CARDS */
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

/* BUTTON */
button{
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#00f2ff,#0066ff);
  color:white;
  font-weight:bold;
}

/* MINING ANIMATION */
.mining-circle{
  width:150px;
  height:150px;
  border-radius:50%;
  border:5px solid #00f2ff;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  animation:spin 5s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

.counter{
  text-align:center;
  font-size:22px;
  margin-top:10px;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">
  <div class="menu-btn" onclick="toggleDrawer()">☰</div>
  <div>RIDA NETWORK</div>
</div>

<div id="drawer" class="drawer">
  <div onclick="showPage('home')">🏠 Home</div>
  <div onclick="showPage('mining')">⛏ Mining</div>
  <div onclick="showPage('wallet')">💰 Wallet</div>
  <div onclick="showPage('admin')">👑 Admin</div>
</div>

<!-- HOME -->
<div id="home" class="page active-page">
  <div class="card">
    <h3>📢 Broadcast</h3>
    <p id="broadcast"></p>
  </div>

  <div class="card">
    <h2>Balance</h2>
    <h1 id="balance">0</h1>
  </div>
</div>

<!-- MINING -->
<div id="mining" class="page">
  <div class="card">
    <div class="mining-circle">
      ⚡
    </div>

    <div class="counter" id="counter">0.000</div>

    <button onclick="startMining()">Start Mining</button>
    <button onclick="claim()">Claim</button>
  </div>
</div>

<!-- WALLET -->
<div id="wallet" class="page">
  <div class="card">
    <input id="amount" placeholder="Amount">
    <input id="walletAddr" placeholder="Wallet Address">
    <button onclick="withdraw()">Withdraw</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
  <div class="card">
    <h3>Users</h3>
    <button onclick="loadUsers()">Load Users</button>
    <div id="users"></div>
  </div>

  <div class="card">
    <input id="broadcastMsg" placeholder="Message">
    <button onclick="sendBroadcast()">Send</button>
  </div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzFwjQRnPDSlvqyHwYSiqFkqEZB73YAEK7R5ToKpO9VRkx_x5ZkpCC0kM2GHilQ0tYS/exec";

let token=localStorage.getItem("token");
let miningActive=false;
let counter=0;

// DRAWER
function toggleDrawer(){
  drawer.classList.toggle("active");
}

// PAGE SWITCH
function showPage(p){
  document.querySelectorAll(".page").forEach(el=>el.classList.remove("active-page"));
  document.getElementById(p).classList.add("active-page");
}

// LOAD APP
async function load(){
  let res=await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"getStatus",token})
  });
  let d=await res.json();

  balance.innerText=d.balance;
  broadcast.innerText=d.broadcast;

  if(d.role!=="admin"){
    document.querySelector('[onclick="showPage(\'admin\')"]').style.display="none";
  }
}

// MINING COUNTER
function startCounter(){
  miningActive=true;
  setInterval(()=>{
    if(miningActive){
      counter+=0.00001;
      document.getElementById("counter").innerText=counter.toFixed(5);
    }
  },1000);
}

// API CALLS
async function startMining(){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"startMining",token})
  });
  startCounter();
}

async function claim(){
  let r=await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"claimMining",token})
  });
  let d=await r.json();

  if(d.success){
    balance.innerText=d.balance;
    counter=0;
  }
}

async function withdraw(){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"withdraw",
      token,
      amount:parseFloat(amount.value),
      wallet:walletAddr.value
    })
  });
  alert("Requested");
}

// ADMIN
async function loadUsers(){
  let r=await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"getUsers",token})
  });
  let d=await r.json();

  users.innerHTML="";
  d.users.slice(1).forEach(u=>{
    users.innerHTML+=`
      <div class="card">
        ${u[1]} | ${u[4]}
        <button onclick="verify('${u[0]}')">Verify</button>
      </div>
    `;
  });
}

async function verify(id){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"updateKYC",
      token,
      userId:id,
      status:"verified"
    })
  });
}

async function sendBroadcast(){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"broadcast",
      token,
      message:broadcastMsg.value
    })
  });
}

// AUTO LOAD
if(token){
  load();
}

</script>

</body>
</html>
