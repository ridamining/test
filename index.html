<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rida Network</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
.glow {
  box-shadow: 0 0 20px #facc15;
}
</style>

</head>

<body class="bg-gray-900 text-white">

<div class="flex">

<!-- SIDEBAR -->
<div class="w-20 bg-gray-800 h-screen flex flex-col items-center py-5">
  <div class="text-yellow-400 text-2xl">⛏</div>
</div>

<!-- MAIN -->
<div class="flex-1 p-5">

<h1 class="text-2xl mb-4 text-yellow-400">Rida Network</h1>

<!-- AUTH -->
<div id="auth">

<input id="email" placeholder="Email" class="p-2 w-full mb-2 text-black rounded">
<input id="password" type="password" placeholder="Password" class="p-2 w-full mb-2 text-black rounded">

<button onclick="register()" class="bg-blue-500 w-full p-2 mb-2 rounded">Register</button>
<button onclick="login()" class="bg-green-500 w-full p-2 rounded">Login</button>

</div>

<!-- DASHBOARD -->
<div id="app" class="hidden">

<div class="bg-gray-800 p-4 rounded mb-4">
<p class="text-gray-400">Balance</p>
<p class="text-4xl text-green-400" id="balance">0</p>
</div>

<!-- MINING -->
<div class="bg-gray-800 p-5 rounded text-center glow">

<p id="miningStatus">Idle</p>

<p class="text-3xl my-3 text-yellow-400" id="counter">0.000</p>

<button onclick="startMining()" 
class="bg-yellow-500 px-5 py-2 rounded">
Start Mining
</button>

</div>

<p id="msg" class="mt-3 text-gray-400"></p>

<button onclick="logout()" class="mt-5 bg-red-500 p-2 rounded w-full">
Logout
</button>

</div>

</div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxI3vMoMaGF0Ia4s_zxZX7k6vP5r4FKDKtbq0Zxq6gPuqanwcizwo-OvVg6SYFI-3nw/exec";

let user = null;
let mining = false;
let counter = 0;
let interval;

/******** API ********/
async function api(data){
  const res = await fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"text/plain" },
    body: JSON.stringify(data)
  });

  return JSON.parse(await res.text());
}

/******** AUTH ********/
async function register(){
  const email = emailEl().value;
  const password = passEl().value;

  alert(JSON.stringify(await api({action:"register",email,password})));
}

async function login(){
  const email = emailEl().value;
  const password = passEl().value;

  const res = await api({action:"login",email,password});

  if(res.success){
    user = res.user;
    save();
    showApp();
  }else alert(res.error);
}

/******** APP ********/
function showApp(){
  auth.style.display="none";
  app.style.display="block";
  balance.innerText = user.balance;
}

/******** MINING ********/
function startMining(){

  if(mining) return;

  mining = true;
  counter = 0;

  miningStatus.innerText = "Mining Active";

  interval = setInterval(()=>{
    counter += 0.001;
    counterEl().innerText = counter.toFixed(3);
  },1000);

  setTimeout(async ()=>{
    clearInterval(interval);

    const res = await api({
      action:"claim",
      userId:user.userId
    });

    if(res.success){
      user.balance = res.balance;
      balance.innerText = res.balance;
      msg.innerText = "✅ Reward added!";
    }else{
      msg.innerText = res.error;
    }

    mining=false;
    miningStatus.innerText = "Idle";

  },5000); // demo speed
}

/******** STORAGE ********/
function save(){
  localStorage.setItem("user", JSON.stringify(user));
}

function load(){
  const u = localStorage.getItem("user");
  if(u){
    user = JSON.parse(u);
    showApp();
  }
}

/******** LOGOUT ********/
function logout(){
  localStorage.clear();
  location.reload();
}

/******** SHORTCUTS ********/
const emailEl = ()=>document.getElementById("email");
const passEl = ()=>document.getElementById("password");
const counterEl = ()=>document.getElementById("counter");

/******** INIT ********/
load();

</script>

</body>
</html>
